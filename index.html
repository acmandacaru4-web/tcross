<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-CROSS Painel de Consumo</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#080c18;
  --bg2:#0f1628;
  --bg3:#162040;
  --text:#f0f4ff;
  --muted:#6b7a99;
  --border:#1e2d50;
  --primary:#f5c518;
  --primary2:#ffdb4d;
  --success:#00e676;
  --warning:#ff9800;
  --danger:#ff3d57;
  --eth:#00c896;
  --gas:#f5a623;
  --blue:#4a9eff;
  --radius:16px;
  --radius-sm:10px;
}

body{
  font-family:'Sora',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,12,24,0.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
  z-index:100;
}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--muted);
  font-family:'Sora',sans-serif;font-size:10px;
  cursor:pointer;padding:4px 10px;border-radius:8px;
  transition:all 0.2s;min-width:52px;
}
.bn-item.on{color:var(--primary);}
.bn-item svg{width:22px;height:22px;}
.bn-add{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(245,197,24,0.4);
  transition:transform 0.15s,box-shadow 0.15s;
  margin-top:-16px;
}
.bn-add:active{transform:scale(0.93);box-shadow:0 2px 10px rgba(245,197,24,0.3);}
.bn-add svg{width:26px;height:26px;color:#000;}

/* ── MORE MENU ── */
.more-menu{
  position:fixed;bottom:70px;right:12px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px;
  display:none;flex-direction:column;gap:4px;
  z-index:200;min-width:160px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.more-menu.open{display:flex;}
.more-item{
  background:none;border:none;color:var(--text);
  font-family:'Sora',sans-serif;font-size:13px;
  padding:10px 14px;border-radius:8px;cursor:pointer;
  text-align:left;transition:background 0.15s;
  display:flex;align-items:center;gap:10px;
}
.more-item:hover,.more-item.on{background:var(--bg3);color:var(--primary);}

/* ── MAIN ── */
main{
  max-width:480px;margin:0 auto;
  padding:16px 14px 90px;
}

/* PC: centraliza e limita largura */
@media(min-width:600px){
  /* Nav continua embaixo, mas centralizada */
  .bottom-nav{
    max-width:900px;
    left:50%; transform:translateX(-50%);
    border-radius:16px 16px 0 0;
  }
  .more-menu{ right:calc(50% - 450px + 12px); }

  /* Main mais largo */
  main{
    max-width:900px;
    margin:0 auto;
    padding:24px 32px 100px;
    width:100%;
  }

  .stat-grid{ grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); }
  .page-title{ font-size:26px; }
}

@media(min-width:900px){
  main{ max-width:1100px; padding:24px 48px 100px; }
  .bottom-nav{ max-width:1100px; }
  .more-menu{ right:calc(50% - 550px + 12px); }
}
.sec{display:none;}
.sec.on{display:block;}

/* ── PAGE HEADER ── */
.page-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.page-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.odo-pill{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;font-weight:600;color:var(--blue);
  white-space:nowrap;
}

/* ── CARDS ── */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
}
.card.accent-gas::before{background:linear-gradient(90deg,transparent,var(--gas),transparent);}
.card.accent-eth::before{background:linear-gradient(90deg,transparent,var(--eth),transparent);}
.card.accent-blue::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.card.accent-primary::before{background:linear-gradient(90deg,transparent,var(--primary),transparent);}
.card.accent-sim{border-color:var(--warning);box-shadow:0 0 0 1px rgba(255,152,0,0.15);}

.card-title{
  font-size:12px;font-weight:600;
  color:var(--muted);text-transform:uppercase;letter-spacing:1px;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.card-title svg{width:14px;height:14px;}

/* ── STAT GRID ── */
.stat-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.stat-grid.cols3{grid-template-columns:1fr 1fr 1fr;}
.stat-grid.cols1{grid-template-columns:1fr;}

.stat-item{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px;
}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;}
.stat-value{
  font-size:20px;font-weight:700;color:var(--primary);
  font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px;
  line-height:1.1;
}
.stat-value.sm{font-size:15px;}
.stat-value.gas{color:var(--gas);}
.stat-value.eth{color:var(--eth);}
.stat-value.blue{color:var(--blue);}
.stat-value.danger{color:var(--danger);}
.stat-value.warning{color:var(--warning);}
.stat-value.success{color:var(--success);}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* ── HERO CARD ── */
.hero-card{
  background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-bottom:14px;
  display:flex;align-items:center;gap:16px;
}
.hero-icon{
  width:56px;height:56px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.hero-icon.gas{background:rgba(245,166,35,0.15);color:var(--gas);}
.hero-icon.eth{background:rgba(0,200,150,0.15);color:var(--eth);}
.hero-icon.blue{background:rgba(74,158,255,0.15);color:var(--blue);}
.hero-icon svg{width:28px;height:28px;}
.hero-label{font-size:12px;color:var(--muted);font-weight:500;}
.hero-value{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-1px;line-height:1;}
.hero-sub{font-size:12px;color:var(--muted);margin-top:4px;}

/* ── BEST FUEL BADGE ── */
.best-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(0,230,118,0.12);border:1px solid rgba(0,230,118,0.3);
  color:var(--success);padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:700;
}

/* ── PROGRESS BAR ── */
.progress-wrap{margin:10px 0 4px;}
.progress-bar{
  height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--blue),var(--primary));
  transition:width 0.5s ease;
}

/* ── LIST ITEMS ── */
.list-item{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;
  margin-bottom:10px;
}
.li-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.li-title{font-size:14px;font-weight:600;}
.li-meta{font-size:12px;color:var(--muted);line-height:1.6;}
.li-value{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--primary);white-space:nowrap;}
.li-actions{display:flex;gap:6px;margin-top:10px;}

/* ── FUEL BADGE ── */
.fuel-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;
}
.fuel-tag.gas{background:rgba(245,166,35,0.15);color:var(--gas);border:1px solid rgba(245,166,35,0.3);}
.fuel-tag.eth{background:rgba(0,200,150,0.15);color:var(--eth);border:1px solid rgba(0,200,150,0.3);}

/* ── BUTTONS ── */
.btn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:9px 14px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:13px;font-family:'Sora',sans-serif;
  font-weight:500;transition:all 0.15s;
}
.btn:active{transform:scale(0.97);}
.btn.pr{background:var(--primary);color:#000;border-color:var(--primary);font-weight:700;}
.btn.pr:active{background:var(--primary2);}
.btn.danger{background:rgba(255,61,87,0.15);color:var(--danger);border-color:rgba(255,61,87,0.3);}
.btn.sm{padding:6px 10px;font-size:12px;}
.btn.full{width:100%;}

/* ── FORM ── */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.form-input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:12px 14px;border-radius:var(--radius-sm);
  font-size:15px;font-family:'Sora',sans-serif;
  transition:border-color 0.15s;
}
.form-input:focus{outline:none;border-color:var(--primary);}
.form-input::placeholder{color:var(--muted);}
textarea.form-input{height:120px;resize:vertical;font-size:13px;}

/* ── SH (section header) ── */
.sh{
  border-left:3px solid var(--primary);
  padding:10px 14px;margin-bottom:16px;
  background:var(--bg2);border-radius:0 var(--radius-sm) var(--radius-sm) 0;
}
.sh-title{font-size:15px;font-weight:700;}

/* ── MAINT ITEM ── */
.maint-item{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;
  margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;
}
.maint-check{width:20px;height:20px;cursor:pointer;accent-color:var(--primary);flex-shrink:0;margin-top:2px;}
.maint-item.done{opacity:0.5;}
.maint-item.done .maint-title{text-decoration:line-through;}
.maint-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.maint-desc{font-size:12px;color:var(--muted);}
.maint-km{font-size:12px;color:var(--muted);margin-top:8px;padding:8px;background:var(--bg3);border-radius:8px;}
.maint-content{flex:1;}

/* ── TOAST ── */
/* ── INLINE FORM (substitui modal) ── */
.inline-form{
  background:var(--bg2);border:2px solid var(--primary);
  border-radius:var(--radius);padding:20px;margin-bottom:14px;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.inline-form-title{
  font-size:15px;font-weight:700;color:var(--primary);
  margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;
}
.inline-form-fields{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;}
.inline-form-field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.inline-form-field input,.inline-form-field select{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:12px 14px;border-radius:10px;
  font-size:16px;font-family:'Sora',sans-serif;
  -webkit-appearance:none;
}
.inline-form-field input:focus,.inline-form-field select:focus{outline:none;border-color:var(--primary);}
.inline-form-btns{display:flex;gap:10px;}
.inline-form-btns button{flex:1;}

/* modal overlay mantido mas só para fallback */
#modal-overlay{display:none !important;}

#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--border);
  color:var(--text);padding:12px 20px;border-radius:20px;
  font-size:13px;font-weight:500;opacity:0;
  transition:opacity 0.3s,transform 0.3s;
  pointer-events:none;z-index:300;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
#toast.show{opacity:1;}
#toast.ok{border-color:var(--success);color:var(--success);}
#toast.err{border-color:var(--danger);color:var(--danger);}

/* ── HISTORICO TOGGLE ── */
.ciclo-toggle{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  color:var(--text);padding:14px 16px;border-radius:var(--radius-sm);
  font-family:'Sora',sans-serif;font-size:14px;font-weight:600;
  text-align:left;cursor:pointer;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
}
.ciclo-toggle:active{background:var(--bg3);}

@media(max-width:400px){
  .stat-value{font-size:17px;}
  .hero-value{font-size:24px;}
}
</style>

</nav>

<!-- MORE MENU -->
<div class="more-menu" id="more-menu">

  <button class="more-item" onclick="go('config');toggleMore()">⚙️ Config</button>
  <button class="more-item" onclick="go('sync');toggleMore()">🔄 Sincronizar</button>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-fields" id="modal-fields"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn pr" id="modal-confirm" onclick="modalConfirm()">Confirmar</button>
    </div>
  </div>
</div>
<div id="toast"></div>

function atualizarPrecoConfig() {
  const postos = POSTOS.filter(p => p.nome !== 'Preços Preferidos');
  if (postos.length === 0) return;
  // Favorito por combustível: favGas e favEth são independentes
  const favGas = postos.find(p => p.favGas);
  const favEth = postos.find(p => p.favEth);
  CONFIG.gasPrice = favGas ? favGas.gasP : Math.min(...postos.map(p=>p.gasP));
  CONFIG.ethPrice = favEth ? favEth.ethP : Math.min(...postos.map(p=>p.ethP));
}

  if (t) TODOS = JSON.parse(t);

  if (tr) TRAJETOS = JSON.parse(tr);
  if (p) POSTOS = JSON.parse(p);

  if (c2) CICLO2 = JSON.parse(c2);
  
  // Garante ordenação cronológica ao carregar
  sortTodosChronologically();
  // Sempre recalcula consumos ao carregar
  recalculateKm();
  atualizarPrecoConfig();
}

// ══════════════════════════════ HELPERS ══════════════════════════════
function parseDate(dateStr) {
  if (!dateStr) return new Date(0);
  const parts = dateStr.split('/');
  if (parts.length < 2) return new Date(0);
  const day = parseInt(parts[0]);
  const month = parseInt(parts[1]) - 1;
  const year = parts.length === 3 ? parseInt(parts[2]) : new Date().getFullYear();
  return new Date(year, month, day);
}

function sortTodosChronologically() {
  TODOS.sort((a, b) => {
    // Ordena sempre por data primeiro
    const dA = parseDate(a.data), dB = parseDate(b.data);
    if (dA.getTime() !== dB.getTime()) return dA - dB;
    // Mesma data: ordena por odo (parcial odo=0 vem antes)
    const odA = a.odo || 0;
    const odB = b.odo || 0;
    if (odA !== odB) return odA - odB;
    // Mesmo odo e data: parcial vem antes do completo
    if (a.parcial && !b.parcial) return -1;
    if (!a.parcial && b.parcial) return 1;
    return 0;
  });
}

function getLastAbastecimento() {
  return TODOS.length > 0 ? TODOS[TODOS.length - 1] : null;
}

function getAverageConsumption(comb, dados) {
  // Se não passar dados, usa só o ciclo atual (TODOS)
  const arr = dados || TODOS;
  const filtered = arr.filter(d =>
    (d.combC||d.comb) === comb &&
    d.km > 0 && d.vol > 0 && d.cons > 0 && d.cons < 30 &&
    !d.parcial && d.comb !== 'Misto' && !d.misto
  );
  if (filtered.length === 0) return 0;
  // Média das eficiências individuais ponderada pela quilometragem de cada abastecimento
  const totalKm = filtered.reduce((a,d) => a + d.km, 0);
  const pond    = filtered.reduce((a,d) => a + (d.cons * d.km), 0);
  return (pond / totalKm).toFixed(2);
}

function getAverageConsumptionCiclo(comb, numCiclo) {
  // Retorna média de um ciclo específico
  if (numCiclo === 1) return getAverageConsumption(comb, CICLO1);
  if (numCiclo === 2) return getAverageConsumption(comb, CICLO2);
  return getAverageConsumption(comb, TODOS);
}

function getCostPerKm(comb) {
  // Usa preço ATUAL do CONFIG com média real de consumo
  const avg = parseFloat(getAverageConsumption(comb)) || 0;
  if (avg === 0) return 0;
  const preco = comb === 'Gasolina' ? CONFIG.gasPrice : CONFIG.ethPrice;
  return (preco / avg).toFixed(3);
}

function getBestFuel() {
  const gasCpk = parseFloat(getCostPerKm('Gasolina')) || 0;
  const ethCpk = parseFloat(getCostPerKm('Etanol')) || 0;
  if (gasCpk === 0 && ethCpk === 0) return null;
  if (gasCpk === 0) return 'Etanol';
  if (ethCpk === 0) return 'Gasolina';
  return ethCpk < gasCpk ? 'Etanol' : 'Gasolina';
}

function getEficienciaRelativa() {
  const gasAvg = parseFloat(getAverageConsumption('Gasolina')) || 0;
  const ethAvg = parseFloat(getAverageConsumption('Etanol')) || 0;
  if (gasAvg === 0) return 0;
  return ((ethAvg / gasAvg) * 100).toFixed(1);
}

function getRelacaoPrecos() {
  const gasPl = CONFIG.gasPrice;
  const ethPl = CONFIG.ethPrice;
  if (gasPl === 0) return 0;
  return ((ethPl / gasPl) * 100).toFixed(1);
}

let sortOrder = 'desc';

function renderAbast() {
  const display = sortOrder==='desc'?[...TODOS].reverse():[...TODOS];

    </div>
    <div>`;

  display.forEach(d => {
    const ri = TODOS.indexOf(d);
    // Usa d.cons calculado pelo recalculateKm (já inclui volume de parciais)
    const cons = d.km===0 ? 'parcial'
      : (d.cons>0 && d.cons<30 ? String(d.cons) : '—');
    const tagComb = d.parcial ? 'parcial'
      : d.comb==='Misto' || d.misto ? 'misto'
      : d.comb==='Gasolina' ? 'gas' : 'eth';
    const tagLabel = d.parcial ? '⚡ Parcial'
      : d.comb==='Misto'||d.misto ? '🔀 Misto'
      : d.comb==='Gasolina' ? '⛽ Gasolina' : '🌿 Etanol';
    const tagStyle = tagComb==='gas'
      ? 'class="fuel-tag gas"'
      : tagComb==='eth'
      ? 'class="fuel-tag eth"'
      : tagComb==='misto'
      ? 'style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;background:rgba(160,80,255,0.15);color:#b07aff;border:1px solid rgba(160,80,255,0.3);"'
      : 'style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;background:rgba(255,152,0,0.15);color:var(--warning);border:1px solid rgba(255,152,0,0.3);"';
    const tag = '<span '+tagStyle+'>'+tagLabel+'</span>';
    html += `
      <div class="list-item">
        <div class="li-header">
          <div>
            <div class="li-title" style="display:flex;align-items:center;gap:8px;">
              ${tag}
              <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--blue);">${d.parcial||d._odoOriginal===0?'parcial':(d.odo||0).toLocaleString('pt-BR')+' km'}</span>
            </div>
            <div class="li-meta" style="margin-top:4px;">
              ${d.data} · ${(d.vol||0).toFixed(2)}L · R$ ${(d.pl||0).toFixed(2)}/L
              ${d.posto?' · '+d.posto:''}
            </div>
          </div>
          <div style="text-align:right;">
            <div class="li-value">R$ ${parseFloat(d.total||0).toFixed(2)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;">${cons} km/L · ${d.km||0} km</div>
          </div>
        </div>
        <div class="li-actions">
          <button class="btn sm" onclick="editAbast(${ri})">✎ Editar</button>
          <button class="btn sm danger" onclick="delAbast(${ri})">✕</button>
        </div>
      </div>`;
  });

  if(!TODOS.length) html += '<div style="text-align:center;padding:40px;color:var(--muted);">Nenhum abastecimento. Toque + para adicionar.</div>';
  html += '</div>';
  document.getElementById('sec-abastecimentos').innerHTML = html;
}

function editAbast(i) {
  const d = TODOS[i];
  if (!d) return;
  showModal('✎ Editar Abastecimento', [
    {id:'odo',   label:'Odômetro (km)',   type:'number', value:d.odo},
    {id:'pl',    label:'Preço/L (R$)',    type:'number', value:d.pl,   step:'0.01'},
    {id:'vol',   label:'Volume (L)',      type:'number', value:d.vol,  step:'0.01'},
    {id:'comb',  label:'Combustível',     type:'select', value:d.comb||'Etanol',
      options:[{value:'Etanol',label:'🌿 Etanol'},{value:'Gasolina',label:'⛽ Gasolina'}]},
    {id:'data',  label:'Data (dd/mm)',    type:'text',   value:d.data},
    {id:'posto', label:'Posto',           type:'text',   value:d.posto||''},
  ], vals => {
    const odo   = parseInt(mVal(vals,'odo',d.odo))                                || d.odo;
    const pl    = parseFloat(String(mVal(vals,'pl',d.pl)).replace(',','.'))       || d.pl;
    const vol   = parseFloat(String(mVal(vals,'vol',d.vol)).replace(',','.'))     || d.vol;
    const comb  = mVal(vals,'comb', d.comb);
    const data  = mVal(vals,'data', d.data).trim() || d.data;
    const posto = mVal(vals,'posto', d.posto||'');
    TODOS[i] = {...d, odo, pl, vol, comb, data, posto,
      total: parseFloat((vol*pl).toFixed(2)),
      km: d.km, cons: d.cons};
    sortTodosChronologically();
    recalculateKm();
    saveData();
    toast('✓ Atualizado', 'ok');
    renderAbast();
    renderDash();
    if (localStorage.getItem('gh_token')) setTimeout(ghSaveData, 500);
  });
}

function delAbast(i) {
  if (!TODOS[i]) return;
  showModal('🗑 Confirmar exclusão', [
    {id:'ok', label:'Digite SIM para excluir', type:'text', placeholder:'SIM'},
  ], vals => {
    if (mVal(vals,'ok','').trim().toUpperCase() !== 'SIM') { toast('⚠ Cancelado'); return; }
    TODOS.splice(i, 1);
    recalculateKm();
    saveData();
    toast('✓ Removido', 'ok');
    renderAbast();
    renderDash();
    if (localStorage.getItem('gh_token')) setTimeout(ghSaveData, 500);
  });
}

function toggleSort(){
  sortOrder = sortOrder==='asc'?'desc':'asc';
  renderAbast();
}

function renderMaint() {
  const currentOdo = TODOS.length > 0 ? Math.max(...TODOS.map(d => d.odo)) : 0;
  const cicloNum = HISTORICO_CICLOS.length + 1;
  const kmFaltamRevisao = CONFIG.nextReview - currentOdo;
  const doneCount = MANUTENCAO.filter(m => m.done).length;
  const totalCount = MANUTENCAO.length;
  
  let html = `
    <div class="page-header"><div><div class="page-title">Manutenção</div><div class="page-sub">Ciclo ${cicloNum} · ${doneCount}/${totalCount} concluídos</div></div><button class="btn sm" onclick="renovarChecklist()">🔄 Novo ciclo</button></div>
    
    <div class="card">
      <div class="card-title">Próxima Revisão</div>
      <div class="stat">
        <div class="stat-item">
          <div class="stat-label">Odômetro atual</div>
          <div class="stat-value">${currentOdo.toLocaleString('pt-BR')} km</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Revisão prevista em</div>
          <div class="stat-value">${CONFIG.nextReview.toLocaleString('pt-BR')} km</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Faltam</div>
          <div class="stat-value" style="color:${kmFaltamRevisao < 1000 ? 'var(--danger)' : kmFaltamRevisao < 3000 ? 'var(--warning)' : 'var(--success)'}">${kmFaltamRevisao.toLocaleString('pt-BR')} km</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-title">Checklist</div>
      <div class="list">
  `;
  
  MANUTENCAO.forEach((m, i) => {
    const kmDesdeInicio = currentOdo % m.freq;
    const kmFaltamItem = m.freq - kmDesdeInicio;
    const percentual = (kmDesdeInicio / m.freq * 100).toFixed(0);
    const urgente = kmFaltamItem < m.freq * 0.1;
    
    html += `
      <div class="maint-item ${m.done ? 'done' : ''}">
        <input type="checkbox" class="maint-check" ${m.done ? 'checked' : ''} onchange="toggleMaint(${i})">
        <div class="maint-content">
          <div class="maint-title">${m.title}</div>
          <div class="maint-desc">${m.desc}</div>
          <div class="maint-km" style="${urgente && !m.done ? 'border-left: 3px solid var(--danger); padding-left: 8px;' : ''}">
            <strong>Frequência:</strong> a cada ${m.freq.toLocaleString('pt-BR')} km · 
            <strong>Faltam:</strong> <span style="color:${urgente ? 'var(--danger)' : 'var(--success)'}">${kmFaltamItem.toLocaleString('pt-BR')} km</span> · 
            <strong>Progresso:</strong> ${percentual}%
          </div>
        </div>
      </div>
    `;
  });
  
  html += `</div></div>`;
  document.getElementById('sec-manutencao').innerHTML = html;
}

function renovarChecklist() {
  if (window.confirm && !confirm('Encerrar ciclo atual e iniciar novo checklist?')) return;
  const cicloNum = HISTORICO_CICLOS.length + 1;
  HISTORICO_CICLOS.push({
    ciclo: cicloNum,
    abastecimentos: [...TODOS],
    revisaoKm: TODOS.length > 0 ? Math.max(...TODOS.map(d => d.odo)) : 0,
    data: new Date().toLocaleDateString('pt-BR')
  });
  MANUTENCAO = MANUTENCAO.map(m => ({...m, done: false}));
  CONFIG.nextReview = (TODOS.length > 0 ? Math.max(...TODOS.map(d => d.odo)) : 0) + 10000;
  saveData();
  toast('✓ Novo ciclo iniciado!');
  renderMaint();
  renderDash();
}

function toggleMaint(i) {
  MANUTENCAO[i].done = !MANUTENCAO[i].done;

  renderMaint();
}

function sanitizarDados() {
  let corrigidos = 0;
  TODOS.forEach(d => {
    if (d.vol > 0 && d.km > 0) {
      const calc = d.km / d.vol;
      if (parseFloat(d.cons) > 30 || parseFloat(d.cons) < 0 || !d.cons) {
        d.cons = calc < 30 ? parseFloat(calc.toFixed(2)) : 0;
        corrigidos++;
      }
    } else if (d.km === 0) {
      if (parseFloat(d.cons) > 0) { d.cons = 0; corrigidos++; }
    }
  });
  saveData();
  toast('✓ ' + corrigidos + ' registros corrigidos', 'ok');
  renderAbast();
  renderDash();
}

function resetarDadosLocais() {
  if (!window.confirm || confirm('Isso vai apagar os dados locais e recarregar do GitHub. Continuar?')) {
    localStorage.removeItem('tcross-todos');

    localStorage.removeItem('tcross-manutencao');

    localStorage.removeItem('tcross-ciclo2');

}

// ══════════════════════════════ GITHUB SYNC ══════════════════════════════
const GH = {
  owner: 'acmandacaru4-web',
  repo: 'tcross',
  file: 'index.html',
  get token() { return localStorage.getItem('gh_token') || ''; },
  set token(v) { localStorage.setItem('gh_token', v); }
};

async function ghGetFileSha() {
  const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.file}`;
  const r = await fetch(url, {headers: {Authorization: `token ${GH.token}`, Accept: 'application/vnd.github.v3+json'}});
  if (!r.ok) throw new Error('Erro ao buscar arquivo: ' + r.status);
  const d = await r.json();
  return {sha: d.sha, content: atob(d.content.replace(/\n/g,''))};
}

async function ghSaveData() {
  if (!GH.token) { toast('⚠ Configure o token GitHub primeiro'); return; }
  try {
    toast('⏳ Salvando no GitHub...');
    const dadosJSON = JSON.stringify({
      todos: TODOS, config: CONFIG, manutencao: MANUTENCAO,
      historico: HISTORICO_CICLOS, trajetos: TRAJETOS, postos: POSTOS,
      ciclo1: CICLO1, ciclo2: CICLO2, savedAt: new Date().toISOString()
    }, null, 2);

    // Tenta buscar SHA do arquivo dados.json (se já existe)
    const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/dados.json`;
    let sha = null;
    try {
      const r = await fetch(url, {headers: {Authorization: `token ${GH.token}`, Accept: 'application/vnd.github.v3+json'}});
      if (r.ok) { const d = await r.json(); sha = d.sha; }
    } catch(e) {}

    // Salva/atualiza dados.json
    const body = {
      message: 'sync: ' + new Date().toLocaleString('pt-BR'),
      content: btoa(unescape(encodeURIComponent(dadosJSON)))
    };
    if (sha) body.sha = sha;

    const r2 = await fetch(url, {
      method: 'PUT',
      headers: {Authorization: `token ${GH.token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (!r2.ok) throw new Error('Erro ' + r2.status + ': ' + await r2.text());
    toast('✓ Dados salvos no GitHub!');
    renderSync();
  } catch(e) {
    toast('✕ ' + e.message);
    console.error(e);
  }
}

async function ghLoadData() {
  if (!GH.token) { toast('⚠ Configure o token GitHub primeiro'); return; }
  try {
    toast('⏳ Carregando do GitHub...');
    const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/dados.json`;
    const r = await fetch(url, {headers: {Authorization: `token ${GH.token}`, Accept: 'application/vnd.github.v3+json'}});
    if (!r.ok) throw new Error('Arquivo dados.json não encontrado. Salve primeiro em outro dispositivo.');
    const d = await r.json();
    const data = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))));

    if (data.todos)      TODOS = data.todos;
    if (data.config)     CONFIG = data.config;
    if (data.manutencao) MANUTENCAO = data.manutencao;
    if (data.historico)  HISTORICO_CICLOS = data.historico;
    if (data.trajetos)   TRAJETOS = data.trajetos;
    if (data.postos)     POSTOS = data.postos;
    if (data.ciclo1)     CICLO1 = data.ciclo1;
    if (data.ciclo2)     CICLO2 = data.ciclo2;
    sortTodosChronologically();
    recalculateKm();       // sempre recalcula ao carregar do GitHub
    atualizarPrecoConfig();
    CONFIG = {...CONFIG, ...(data.config||{})};
    saveData();
    const savedAt = data.savedAt ? new Date(data.savedAt).toLocaleString('pt-BR') : '?';
    toast('✓ Dados carregados! Última sync: ' + savedAt, 'ok');
    go('dashboard');
  } catch(e) {
    toast('✕ ' + e.message);
    console.error(e);
  }
}

function trocarToken() {
  showModal('🔑 Atualizar Token GitHub', [
    {id:'token', label:'Novo Personal Access Token', type:'text', placeholder:'ghp_...'},
  ], vals => {
    const t = mVal(vals,'token','').trim();
    if (!t) return;
    GH.token = t;
    toast('✓ Token atualizado!', 'ok');
    renderSync();
  });
}

function saveGhToken() {
  const t = document.getElementById('gh-token-input').value.trim();
  if (!t) { toast('⚠ Digite o token'); return; }
  GH.token = t;
  toast('✓ Token salvo!');
  renderSync();
}

function renderSync() {
  const temToken = !!GH.token;

function importCSV() {
  const csv = document.getElementById('csv-input').value.trim();
  if (!csv) { toast('⚠ Cole os dados'); return; }

  const lines = csv.split('\n');
  const newTodos = [];
  let volumeParcialAcumulado = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    
    // Detecta separador (Tab ou Vírgula)
    const sep = line.includes('\t') ? '\t' : ',';
    const cols = line.split(sep).map(c => c.trim().replace('R$', '').replace(/\./g, '').replace(',', '.'));

    // Mapeamento baseado na estrutura da planilha do usuário:
    // 0:Data, 1:Odômetro, 2:Preço/L, 3:Vol Parcial, 4:Vol Completar, 5:Consumo, 6:Km, 7:Comb Consumido, 8:Comb Abastecido, 9:Total, 10:Posto
    
    const data = cols[0];
    const odo = parseInt(cols[1]) || 0;
    const pl = parseFloat(cols[2]) || 0;
    const volParcial = parseFloat(cols[3]) || 0;
    const volCompletar = parseFloat(cols[4]) || 0;
    const km = parseInt(cols[6]) || 0;
    const comb = cols[7] || cols[8] || 'Etanol';
    const total = parseFloat(cols[9]) || 0;
    const posto = cols[10] || '';
    
    console.log(`Linha ${i}: data=${data}, odo=${odo}, pl=${pl}, volParcial=${volParcial}, volCompletar=${volCompletar}, km=${km}, comb=${comb}, total=${total}`);

    // Se não tem km (abastecimento parcial), acumula volume
    if (km === 0 && volParcial > 0) {
      volumeParcialAcumulado += volParcial;
      continue; // Pula para próxima linha
    }

    // Se tem km (abastecimento completo), soma com parciais acumulados
    const volTotal = volCompletar + volumeParcialAcumulado;
    
    if (data && volTotal > 0) {
      newTodos.push({
        data, odo, km, 
        vol: volTotal,
        cons: km > 0 ? (km / volTotal).toFixed(2) : 0, 
        comb: comb.includes('Gasolina') ? 'Gasolina' : 'Etanol', 
        total: total > 0 ? parseFloat(total.toFixed(2)) : (volTotal * pl),
        pl, posto, desc: ''
      });
      volumeParcialAcumulado = 0; // Reset para próximo ciclo
    }
  }

  if (newTodos.length === 0) {
    toast('⚠ Nenhum dado válido encontrado.');
    return;
  }

  TODOS = newTodos;
  sortTodosChronologically();
  recalculateKm();
  saveData();
  toast('✓ ' + TODOS.length + ' registros importados!');
  document.getElementById('csv-input').value = '';
  go('abastecimentos');
}


function detectCombPeloPreco(pl) {
  const gasAvg = parseFloat(getAverageConsumption('Gasolina')) || 10.23;
  const ethAvg = parseFloat(getAverageConsumption('Etanol')) || 8.07;
  const corteEth = CONFIG.gasPrice * (ethAvg / gasAvg);
  return pl <= corteEth ? 'Etanol' : 'Gasolina';
}

function recalculateKm() {
  // ── Passo 1: marcar parciais e calcular km e cons ──
  for (let i = 0; i < TODOS.length; i++) {
    const d = TODOS[i];

    // Parcial: odo zerado ou flag explícita
    if (d.parcial || !d.odo || d.odo === 0) {
      d.parcial = true; d.km = 0; d.cons = 0;
      continue;
    }

    // Último odo de abastecimento completo anterior
    let lastOdo = 0;
    for (let j = i-1; j >= 0; j--) {
      if (!TODOS[j].parcial && TODOS[j].odo > 0) { lastOdo = TODOS[j].odo; break; }
    }

    // Primeiro abastecimento sem referência anterior: só registra odo, sem km/cons
    if (lastOdo === 0) { d.km = 0; d.cons = 0; continue; }

    d.km = Math.max(0, d.odo - lastOdo);

    // Acumula volume de parciais imediatamente anteriores do mesmo combustível
    let volTotal = d.vol;
    for (let j = i-1; j >= 0 && TODOS[j].parcial; j--) {
      if (TODOS[j].comb === d.comb) volTotal += TODOS[j].vol;
    }

    const consCalc = d.km > 0 && volTotal > 0 ? d.km / volTotal : 0;
    d.cons = (consCalc > 0 && consCalc < 30) ? parseFloat(consCalc.toFixed(2)) : 0;
  }

  // ── Passo 2: detectar Misto e gravar combC (combustível consumido) ──
  // combC = combustível que estava no tanque sendo consumido naquele período
  // Quando não há troca: combC = comb (abastecido)
  // Quando há troca (misto): combC = combustível do tanque anterior
  let combAtual = TODOS.length > 0 ? TODOS[0].comb : 'Etanol';
  if (TODOS.length > 0) TODOS[0].combC = TODOS[0].comb;
  for (let i = 1; i < TODOS.length; i++) {
    const d = TODOS[i];
    if (d.parcial || d.comb === 'Misto') { d.misto = false; d.combC = combAtual; continue; }
    if (d.comb !== combAtual) {
      // Trocou de combustível → consumiu o combustível anterior
      d.misto = true;
      d.combC = 'Misto';  // tanque de transição — consumiu mistura
      combAtual = d.comb;  // atualiza para o próximo
    } else {
      d.misto = false;
      d.combC = d.comb;
    }
  }
}

function addAbast() {
  const hoje = new Date();
  const dataHoje = String(hoje.getDate()).padStart(2,'0') + '/' + String(hoje.getMonth()+1).padStart(2,'0');
  const ultimoOdo = TODOS.length > 0 ? Math.max(...TODOS.filter(d=>!d.parcial).map(d=>d.odo)) : 0;

  // Detecta se vai ser Misto: último combustível diferente do mais provável
  const ultCompleto = [...TODOS].reverse().find(d => !d.parcial && d.comb !== 'Misto');
  const ultComb = ultCompleto ? ultCompleto.comb : 'Etanol';
  const combDefault = ultComb; // sugere o mesmo combustível do último

  showModal('⛽ Novo Abastecimento', [
    {id:'odo',  label:'Odômetro (km) — vazio = parcial', type:'number',
      placeholder: ultimoOdo > 0 ? 'ex: '+(ultimoOdo+300) : 'ex: 21748'},
    {id:'pl',   label:'Preço/L (R$)', type:'number', placeholder:'ex: 4.95', step:'0.01'},
    {id:'vol',  label:'Volume (L)',   type:'number', placeholder:'ex: 35.5',  step:'0.01'},
    {id:'comb', label:'Combustível (último: '+ultComb+')', type:'select', value:combDefault,
      options:[{value:'Etanol',label:'🌿 Etanol'},{value:'Gasolina',label:'⛽ Gasolina'},{value:'Misto',label:'🔀 Misto (transição)'}]},
    {id:'data', label:'Data (dd/mm) — vazio = hoje', type:'text', placeholder:dataHoje},
  ], vals => {
    const odoStr = mVal(vals,'odo','').toString().trim();
    const isParcial = odoStr === '' || odoStr === '0';
    const odo   = isParcial ? 0 : (parseInt(odoStr) || 0);
    const pl    = parseFloat(String(mVal(vals,'pl',0)).replace(',','.')) || 0;
    const vol   = parseFloat(String(mVal(vals,'vol',0)).replace(',','.')) || 0;
    const comb  = mVal(vals,'comb', combDefault);
    const dataV = mVal(vals,'data','').trim() || dataHoje;

    // Auto-detecta Misto: trocou de combustível em relação ao último completo
    const isMisto = !isParcial && comb !== 'Misto' && ultComb && ultComb !== comb;

    TODOS.push({
      data:dataV, odo, km:0, vol, cons:0,
      comb: isMisto ? 'Misto' : comb,
      _combReal: comb,  // guarda o combustível real abastecido
      _mistoManual: isMisto,
      total: vol>0&&pl>0 ? parseFloat((vol*pl).toFixed(2)) : 0,
      pl, posto:'', desc:'', parcial: isParcial
    });

    sortTodosChronologically();
    recalculateKm();
    saveData();

    const tipoMsg = isParcial ? '· parcial' : isMisto ? '· 🔀 Misto (transição detectada!)' : '· '+odo.toLocaleString('pt-BR')+' km';
    toast('✓ ' + dataV + ' · ' + (isMisto?'Misto':comb) + ' ' + tipoMsg, 'ok');
    renderAbast();
    renderDash();
    if (localStorage.getItem('gh_token')) setTimeout(ghSaveData, 500);
  });
}

// Extrai distância de link do Google Maps (formato /dir/...)
async function extrairDistanciaGMaps(url) {
  // Tenta extrair do padrão !4d e !3d (coordenadas) ou do texto da URL
  // Google Maps links têm a distância no formato: /data=...!4f{km}
  // Como não podemos fazer fetch do Maps sem API key, vamos parsear a URL
  try {
    // Formato: maps.app.goo.gl ou google.com/maps/dir
    const match = url.match(/maps\.app\.goo\.gl\/|google\.com\/maps/);
    if (!match) return null;
    // Tenta extrair distância do fragmento /data= se presente
    const dataMatch = url.match(/!4f([\d.]+)/);
    if (dataMatch) return parseFloat(dataMatch[1]);
    return null; // não conseguiu extrair
  } catch(e) { return null; }
}

function kmPorMes(t) {
  // Converte frequencia para km/mes
  // freq: 'semana', 'quinzena', 'mes'
  // vezes: quantas vezes nessa frequencia
  const freq = t.freq || 'semana';
  const vezes = t.vezes || 0;
  const dist = t.dist || 0;
  if (freq === 'semana')   return dist * vezes * 4.33;
  if (freq === 'quinzena') return dist * vezes * 2;
  if (freq === 'mes')      return dist * vezes;
  return 0;
}

function kmPorSemana(t) {
  const freq = t.freq || 'semana';
  const vezes = t.vezes || 0;
  const dist = t.dist || 0;
  if (freq === 'semana')   return dist * vezes;
  if (freq === 'quinzena') return dist * vezes / 2;
  if (freq === 'mes')      return dist * vezes / 4.33;
  return 0;
}

function freqLabel(t) {
  const freq = t.freq || 'semana';
  const vezes = t.vezes || 0;
  if (vezes === 0) return 'eventual';
  const labels = {semana:'x/sem', quinzena:'x/quinzena', mes:'x/mês'};
  return vezes + ' ' + (labels[freq]||'x/sem');
}

    {id:'freq',  label:'Frequência',               type:'select', value:t.freq||'semana',
      options:[{value:'semana',label:'Semanal'},{value:'quinzena',label:'Quinzenal'},{value:'mes',label:'Mensal'},{value:'eventual',label:'Eventual'}]},
    {id:'vezes', label:'Vezes por período',         type:'number', value:t.vezes||0},
    {id:'mapUrl',label:'Link Google Maps',          type:'text',   value:t.mapUrl||''},
  ], vals => {
    const nome  = mVal(vals,'nome',t.nome).trim() || t.nome;
    const dist  = parseFloat(String(mVal(vals,'dist',t.dist)).replace(',','.')) || t.dist;

    TRAJETOS[i] = {...t, nome, dist, freq, vezes, mapUrl};

}

function delTrajeto(i) {

function renderPostos() {

          <div class="stat-sub">${postoFavEth ? postoFavEth.nome : (postoMelhorEth?postoMelhorEth.nome:'—')}</div>

        <!-- 2 colunas -->

function addPosto() {
  showModal('⛽ Novo Posto', [
    {id:'nome', label:'Nome do posto',      type:'text',   placeholder:'ex: Posto PEL'},
    {id:'gasP', label:'Preço Gasolina R$/L',type:'number', value:CONFIG.gasPrice, step:'0.01'},
    {id:'ethP', label:'Preço Etanol R$/L',  type:'number', value:CONFIG.ethPrice, step:'0.01'},
  ], vals => {
    const nome = mVal(vals,'nome','').trim(); if (!nome) return;

function delPosto(i) {

function renderCicloHistorico(dados, titulo, elId) {
  if (!dados || dados.length === 0) {
    document.getElementById(elId).innerHTML = `<div class="sh"><span class="sh-title">${titulo}</span></div><div style="text-align:center;padding:40px;color:var(--muted);">Nenhum dado disponível.</div>`;
    return;
  }
  const gasD = dados.filter(d => d.comb === 'Gasolina' && d.km > 0);
  const ethD = dados.filter(d => d.comb === 'Etanol' && d.km > 0);
  const gasKmL = gasD.length ? (gasD.reduce((a,d)=>a+d.km,0) / gasD.reduce((a,d)=>a+d.vol,0)).toFixed(2) : '—';
  const ethKmL = ethD.length ? (ethD.reduce((a,d)=>a+d.km,0) / ethD.reduce((a,d)=>a+d.vol,0)).toFixed(2) : '—';
  const totalGas = gasD.reduce((a,d)=>a+d.total,0).toFixed(2);
  const totalEth = ethD.reduce((a,d)=>a+d.total,0).toFixed(2);
  const totalKm = dados.reduce((a,d)=>a+d.km,0);
  const odoInicio = Math.min(...dados.map(d=>d.odo));
  const odoFim = Math.max(...dados.map(d=>d.odo));

  let html = `
    <div class="sh"><span class="sh-title">${titulo}</span></div>
    <div class="card">
      <div class="card-title">Resumo do Ciclo</div>
      <div class="stat">
        <div class="stat-item"><div class="stat-label">Odômetro início</div><div class="stat-value">${odoInicio.toLocaleString('pt-BR')} km</div></div>
        <div class="stat-item"><div class="stat-label">Odômetro fim</div><div class="stat-value">${odoFim.toLocaleString('pt-BR')} km</div></div>
        <div class="stat-item"><div class="stat-label">Total rodado</div><div class="stat-value">${totalKm.toLocaleString('pt-BR')} km</div></div>
        <div class="stat-item"><div class="stat-label">Média Gasolina</div><div class="stat-value">${gasKmL} km/L</div></div>
        <div class="stat-item"><div class="stat-label">Média Etanol</div><div class="stat-value">${ethKmL} km/L</div></div>
        <div class="stat-item"><div class="stat-label">Total Gasolina</div><div class="stat-value">R$ ${parseFloat(totalGas).toFixed(2)}</div></div>
        <div class="stat-item"><div class="stat-label">Total Etanol</div><div class="stat-value">R$ ${parseFloat(totalEth).toFixed(2)}</div></div>
        <div class="stat-item"><div class="stat-label">Total gasto</div><div class="stat-value">R$ ${(parseFloat(totalGas)+parseFloat(totalEth)).toFixed(2)}</div></div>
      </div>
    </div>
    <div class="sh" style="margin-top:8px;"><span class="sh-title">Abastecimentos (${dados.length})</span></div>
    <div class="list">`;

  const sorted = [...dados].reverse();
  sorted.forEach(d => {
    const cons = d.km > 0 ? (d.km / d.vol).toFixed(2) : '0.00';
    html += `
      <div class="list-item">
        <div class="list-item-title">
          <div style="font-weight:bold;">${d.data} · ${d.comb} · ${d.odo.toLocaleString('pt-BR')} km</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">${d.vol.toFixed(2)}L @ R$ ${d.pl.toFixed(2)}/L · <strong style="color:var(--primary)">${cons} km/L</strong> · ${d.km} km${d.posto ? ' · ' + d.posto : ''}${d.desc ? ' · ' + d.desc : ''}</div>
        </div>
      </div>`;
  });

  html += `</div>`;
  document.getElementById(elId).innerHTML = html;
}

function buildCicloHTML(dados, titulo) {
  if (!dados || dados.length === 0) return '<div style="padding:16px;color:var(--muted);">Nenhum dado.</div>';
  // Usa combC se disponível (C2/C3), senão comb (C1)

  const gasKmL = gasD.length ? (gasD.reduce((a,d)=>a+d.km,0)/gasD.reduce((a,d)=>a+d.vol,0)).toFixed(2) : '—';
  const ethKmL = ethD.length ? (ethD.reduce((a,d)=>a+d.km,0)/ethD.reduce((a,d)=>a+d.vol,0)).toFixed(2) : '—';
  const totalG = dados.filter(d=>d.comb==='Gasolina').reduce((a,d)=>a+parseFloat(d.total||0),0).toFixed(2);
  const totalE = dados.filter(d=>d.comb==='Etanol').reduce((a,d)=>a+parseFloat(d.total||0),0).toFixed(2);
  const totalKm = dados.reduce((a,d)=>a+(d.km||0),0);
  let html = '<div class="card"><div class="stat">';
  html += '<div class="stat-item"><div class="stat-label">km rodados</div><div class="stat-value">' + totalKm.toLocaleString('pt-BR') + '</div></div>';
  html += '<div class="stat-item"><div class="stat-label">Média Gas</div><div class="stat-value">' + gasKmL + ' km/L</div></div>';
  html += '<div class="stat-item"><div class="stat-label">Média Eth</div><div class="stat-value">' + ethKmL + ' km/L</div></div>';
  html += '<div class="stat-item"><div class="stat-label">Total Gas</div><div class="stat-value">R$ ' + parseFloat(totalG).toFixed(2) + '</div></div>';
  html += '<div class="stat-item"><div class="stat-label">Total Eth</div><div class="stat-value">R$ ' + parseFloat(totalE).toFixed(2) + '</div></div>';
  html += '<div class="stat-item"><div class="stat-label">Total gasto</div><div class="stat-value">R$ ' + (parseFloat(totalG)+parseFloat(totalE)).toFixed(2) + '</div></div>';
  html += '</div></div><div class="list">';
  [...dados].reverse().forEach(d => {
    const cons = d.km > 0 ? (d.km/d.vol).toFixed(2) : '0.00';
    html += '<div class="list-item"><div class="list-item-title"><div style="font-weight:bold;">' + d.data + ' · ' + d.comb + ' · ' + (d.odo||0).toLocaleString('pt-BR') + ' km</div>';
    html += '<div style="font-size:11px;color:var(--muted);margin-top:2px;">' + (d.vol||0).toFixed(2) + 'L @ R$ ' + (d.pl||0).toFixed(2) + '/L · <strong>' + cons + ' km/L</strong> · ' + (d.km||0) + ' km' + (d.posto?' · '+d.posto:'') + '</div></div></div>';
  });
  html += '</div>';
  return html;
}


// ══════════════════════════════ IMPORTAÇÃO DE TRAJETOS/POSTOS/CICLOS ══════════════════════════════
function parseSep(line) { return line.includes('	') ? '	' : ','; }
function pn(s) { return parseFloat((s||'').replace(/[^0-9,.-]/g,'').replace(',','.')) || 0; }

function importTrajetos() {
  const raw = document.getElementById('traj-input').value.trim();
  if (!raw) { toast('⚠ Cole os dados'); return; }
  const lines = raw.split('\n');
  const novos = [];
  let nomeAtual = '';
  for (const line of lines) {
    if (!line.trim()) continue;
    const sep = parseSep(line);
    const cols = line.split(sep).map(c => c.trim().replace(/"/g,''));
    // Linha de nome do trajeto (col 0 preenchida, col 4 vazia ou zero)
    if (cols[0] && !['Local','Gasolina','Etanol','km/semana','R$'].some(k=>cols[0].startsWith(k))) {
      const dist = pn(cols[4]);
      if (dist > 0 && cols[0] !== 'Local') {
        nomeAtual = cols[0];
        continue;
      }
      if (cols[0] !== 'Local') { nomeAtual = cols[0]; continue; }
    }
    if (cols[0] === 'Gasolina' && nomeAtual) {
      const dist = pn(cols[4]);
      const kmSem = pn(cols[5]);
      const gasP = pn(cols[1]);
      if (dist > 0) {
        novos.push({nome: nomeAtual, dist, kmSem, gasP, ethP: CONFIG.ethPrice, gasKmL: pn(cols[2])||10.23, ethKmL: 8.07});
      }
    }
    if (cols[0] === 'Etanol' && novos.length > 0) {
      novos[novos.length-1].ethP = pn(cols[1]);
      novos[novos.length-1].ethKmL = pn(cols[2])||8.07;
    }
  }
  if (novos.length === 0) { toast('⚠ Nenhum trajeto encontrado'); return; }
  TRAJETOS = novos;
  saveData();
  toast('✓ ' + novos.length + ' trajetos importados!');
  renderTrajetos();
}

function importPostos() {
  const raw = document.getElementById('postos-input').value.trim();
  if (!raw) { toast('⚠ Cole os dados'); return; }
  const lines = raw.split('\n');
  const novos = [];
  let nomeAtual = '';
  let gasP = 0, ethP = 0, gasKmL = 10.2, ethKmL = 8.1;
  for (const line of lines) {
    if (!line.trim()) continue;
    const sep = parseSep(line);
    const cols = line.split(sep).map(c => c.trim().replace(/"/g,''));
    // Linha de nome do posto (col 0=ETANOL, col 1=nome)
    if (cols[0] === 'ETANOL' && cols[1]) {
      if (nomeAtual && gasP > 0) novos.push({nome:nomeAtual, gasP, ethP, gasKmL, ethKmL});
      nomeAtual = cols[1]; gasP=0; ethP=0;
    }
    if (cols[0] === 'Gasolina') { gasP = pn(cols[1]); gasKmL = pn(cols[2])||10.2; }
    if (cols[0] === 'Etanol')   { ethP = pn(cols[1]); ethKmL = pn(cols[2])||8.1; }
  }
  if (nomeAtual && gasP > 0) novos.push({nome:nomeAtual, gasP, ethP, gasKmL, ethKmL});
  if (novos.length === 0) { toast('⚠ Nenhum posto encontrado'); return; }
  POSTOS = novos;
  saveData();
  toast('✓ ' + novos.length + ' postos importados!');
  renderPostos();
}

function importCiclo(num) {
  const raw = document.getElementById('ciclo'+num+'-input').value.trim();
  if (!raw) { toast('⚠ Cole os dados'); return; }
  const lines = raw.split('\n');
  const novos = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    const sep = parseSep(line);
    const cols = line.split(sep).map(c => c.trim().replace(/"/g,'').replace(/\./g,'').replace(',','.'));
    if (!cols[0] || ['TOTAL','Estatísticas','Média','Data'].some(k=>cols[0].includes(k))) continue;
    if (num === 1) {
      // Ciclo 1: Data(0),Odo(1),Km(2),Vol(3),Cons(4),Comb(5),Total(6),PL(7),Posto(8),Desc(9)
      const vol = parseFloat(cols[3])||0;
      const odo = parseInt(cols[1])||0;
      if (!cols[0].match(/\d/) || vol<=0 || odo<=0) continue;
      novos.push({data:cols[0],odo,km:parseInt(cols[2])||0,vol,cons:parseFloat(cols[4])||0,
        comb:(cols[5]||'Etanol').trim(),total:parseFloat(cols[6])||0,pl:parseFloat(cols[7])||0,
        posto:(cols[8]||'').trim(),desc:(cols[9]||'').trim()});
    } else {
      // Ciclo 2: Data(0),Odo(1),PL(2),Vol(3),Cons(4),Km(5),CombC(6),CombA(7),Total(8),Posto(9)
      const vol = parseFloat(cols[3])||0;
      const odo = parseInt(cols[1])||0;
      if (!cols[0].match(/\d/) || vol<=0 || odo<=0) continue;
      novos.push({data:cols[0],odo,km:parseInt(cols[5])||0,vol,cons:parseFloat(cols[4])||0,
        comb:(cols[7]||cols[6]||'Etanol').trim(),total:parseFloat(cols[8])||0,pl:parseFloat(cols[2])||0,
        posto:(cols[9]||'').trim(),desc:(cols[10]||'').trim()});
    }
  }
  if (novos.length === 0) { toast('⚠ Nenhum dado válido encontrado'); return; }
  if (num === 1) CICLO1 = novos; else CICLO2 = novos;
  saveData();
  toast('✓ ' + novos.length + ' abastecimentos importados no Ciclo ' + num + '!');
  renderHistorico();
}

// ══════════════════════════════ UTILS ══════════════════════════════
function toast(msg, tipo) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (tipo ? ' '+tipo : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2500);
}

// ══════════════════════════════ INIT ══════════════════════════════
// ══ INLINE FORM SYSTEM ══
let _formCallback = null;
const FORM_ID = 'inline-form-container';

function showModal(title, fields, callback) {
  closeModal();
  _formCallback = callback;

  // Usa container fixo no body — não é afetado por re-renders das seções
  let container = document.getElementById('form-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'form-container';
    container.style.cssText = 'position:fixed;bottom:70px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:480px;z-index:400;';
    document.body.appendChild(container);
  }

  const div = document.createElement('div');
  div.id = FORM_ID;
  div.className = 'inline-form';
  div.style.cssText = 'margin:0;box-shadow:0 -4px 30px rgba(0,0,0,0.5);';

  const titleEl = document.createElement('div');
  titleEl.className = 'inline-form-title';
  titleEl.innerHTML = '<span>' + title + '</span><button class="btn sm" onclick="closeModal()" style="padding:4px 10px;">✕</button>';
  div.appendChild(titleEl);

  const fieldsEl = document.createElement('div');
  fieldsEl.className = 'inline-form-fields';
  fields.forEach(f => {
    const fg = document.createElement('div');
    fg.className = 'inline-form-field';
    const lbl = document.createElement('label');
    lbl.textContent = f.label;
    fg.appendChild(lbl);
    if (f.type === 'select') {
      const sel = document.createElement('select');
      sel.id = 'mf-' + f.id;
      f.options.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.value; opt.textContent = o.label;
        if (o.value === f.value) opt.selected = true;
        sel.appendChild(opt);
      });
      fg.appendChild(sel);
    } else {
      const inp = document.createElement('input');
      inp.type = f.type || 'text';
      inp.id = 'mf-' + f.id;
      inp.placeholder = f.placeholder || '';
      inp.value = (f.value !== undefined && f.value !== null) ? f.value : '';
      if (f.step) inp.step = f.step;
      if (f.type === 'number') inp.inputMode = 'decimal';
      inp.addEventListener('keydown', e => { if(e.key==='Enter') formConfirm(); });
      fg.appendChild(inp);
    }
    fieldsEl.appendChild(fg);
  });
  div.appendChild(fieldsEl);

  const btns = document.createElement('div');
  btns.className = 'inline-form-btns';
  btns.innerHTML = '<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn pr" onclick="formConfirm()">✓ Confirmar</button>';
  div.appendChild(btns);

  container.innerHTML = '';
  container.appendChild(div);
  setTimeout(() => { const first = div.querySelector('input,select'); if(first) first.focus(); }, 150);
}

function closeModal() {
  const container = document.getElementById('form-container');
  if (container) container.innerHTML = '';
  _formCallback = null;
}

function formConfirm() {
  const form = document.getElementById(FORM_ID);
  if (!form) return;
  const inputs = form.querySelectorAll('input,select');
  const vals = {};
  inputs.forEach(f => { vals[f.id.replace('mf-','')] = f.value; });
  const cb = _formCallback;
  closeModal();
  if (cb) cb(vals);
}

function mVal(vals, key, def) {
  const v = vals[key];
  if (v === undefined || v === '') return def;
  return v;
}

document.addEventListener('DOMContentLoaded', function() {
  loadData();
  go('dashboard');
});
</script>
