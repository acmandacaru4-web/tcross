      border-bottom: 1px solid var(--border);

      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    
    .nav-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      font-size: 16px;
    }
    
    .nav-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
    }
    
    .tb {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .tb:hover { color: var(--text); border-color: var(--text); }
    .tb.on { background: var(--primary); color: var(--bg); border-color: var(--primary); }
    
    .nav-odo {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .sec { display: none; }
    .sec.on { display: block; }
    
    .sh {
      background: var(--bg2);
      border-left: 3px solid var(--primary);
      padding: 12px 16px;
      margin-bottom: 16px;
      border-radius: 4px;
    }
    
    .sh-title {
      font-weight: bold;
      font-size: 16px;
    }
    
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .card-title {
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 14px;
    }
    
    .stat {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .stat-item {
      background: var(--bg);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: var(--primary);
    }
    
    .editable {
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    .editable:hover {
      background: var(--border);
    }
    
    .editable input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--primary);
      color: var(--text);
      padding: 4px;
      border-radius: 4px;
      font-size: inherit;
    }
    
    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .list-item {
      background: var(--bg);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    
    .list-item-title {
      flex: 1;
    }
    
    .list-item-value {
      font-weight: bold;
      color: var(--primary);
      white-space: nowrap;
    }
    
    .btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .btn:hover { background: var(--border); }
    .btn.pr { background: var(--primary); color: var(--bg); border-color: var(--primary); }
    .btn.pr:hover { background: #ffed4e; }
    .btn.danger { background: var(--danger); border-color: var(--danger); }
    .btn.danger:hover { background: #dc2626; }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: var(--muted);
    }
    
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    
    .form-input:focus { outline: none; border-color: var(--primary); }
    
    .maint-item {
      background: var(--bg);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    
    .maint-check {
      width: 20px;
      height: 20px;
      cursor: pointer;
      margin-top: 2px;
    }
    
    .maint-content {
      flex: 1;
    }
    
    .maint-title {
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 4px;
    }
    
    .maint-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    
    .maint-item.done {
      opacity: 0.6;
      background: var(--bg2);
    }
    
    .maint-item.done .maint-title {
      text-decoration: line-through;
    }
    
    .maint-km {
      background: var(--bg2);
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 8px;
    }
    
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--success);
      color: var(--bg);
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
    }
    
    #toast.show { opacity: 1; }
    
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: bold;
      margin-left: 4px;
    }
    
    .badge.best {
      background: var(--success);
      color: var(--bg);
    }
    
    @media (max-width: 768px) {

        overflow-x: auto;
      }
      
      .stat {

      }
      
      main {
        padding: 12px;
      }
    }
  </style>
</head>

function parseDate(dateStr) {
  if (!dateStr) return new Date(0);
  const parts = dateStr.split('/');
  if (parts.length < 2) return new Date(0);
  const day = parseInt(parts[0]);
  const month = parseInt(parts[1]) - 1;
  const year = parts.length === 3 ? parseInt(parts[2]) : new Date().getFullYear();
  return new Date(year, month, day);
}

function sortTodosChronologically() {
  TODOS.sort((a, b) => {
    const dateA = parseDate(a.data);
    const dateB = parseDate(b.data);
    if (dateA.getTime() !== dateB.getTime()) return dateA - dateB;
    return a.odo - b.odo;
  });
}

function getLastAbastecimento() {
  return TODOS.length > 0 ? TODOS[TODOS.length - 1] : null;
}

function getAverageConsumption(comb) {
  const filtered = TODOS.filter(d => d.comb === comb && d.km > 0);
  if (filtered.length === 0) return 0;
  return (filtered.reduce((a, d) => a + d.km, 0) / filtered.reduce((a, d) => a + d.vol, 0)).toFixed(2);
}

function getCostPerKm(comb) {
  const filtered = TODOS.filter(d => d.comb === comb);
  const totalCost = filtered.reduce((a, d) => a + d.total, 0);
  const totalKm = filtered.reduce((a, d) => a + d.km, 0);
  if (totalKm === 0) return 0;
  return (totalCost / totalKm).toFixed(3);
}

function getBestFuel() {
  const gasCpk = parseFloat(getCostPerKm('Gasolina')) || 0;
  const ethCpk = parseFloat(getCostPerKm('Etanol')) || 0;
  if (gasCpk === 0 && ethCpk === 0) return null;
  if (gasCpk === 0) return 'Etanol';
  if (ethCpk === 0) return 'Gasolina';
  return ethCpk < gasCpk ? 'Etanol' : 'Gasolina';
}

function getEficienciaRelativa() {
  const gasAvg = parseFloat(getAverageConsumption('Gasolina')) || 0;
  const ethAvg = parseFloat(getAverageConsumption('Etanol')) || 0;
  if (gasAvg === 0) return 0;
  return ((ethAvg / gasAvg) * 100).toFixed(1);
}

function getRelacaoPrecos() {
  const gasPl = CONFIG.gasPrice;
  const ethPl = CONFIG.ethPrice;
  if (gasPl === 0) return 0;
  return ((ethPl / gasPl) * 100).toFixed(1);
}

function addAbast() {
  const data = prompt('Data (dd/mm):');
  if (!data) return;
  
  const odo = prompt('OdÃ´metro (km):');
  if (!odo || isNaN(odo)) return;
  
  const vol = prompt('Volume (L):');
  if (!vol || isNaN(vol)) return;
  
  const comb = prompt('CombustÃ­vel (Gasolina/Etanol):', 'Etanol');
  if (!comb) return;
  
  const pl = prompt('PreÃ§o do CombustÃ­vel (R$/L):');
  if (!pl || isNaN(pl)) return;
  
  const newAbast = {
    data, 
    odo: parseInt(odo), 
    km: 0, 
    vol: parseFloat(vol),

    comb, 
    total: (parseFloat(vol) * parseFloat(pl)).toFixed(2), 
    pl: parseFloat(pl), 
    posto: '',

  TODOS.push(newAbast);

  renderDash();
  // Auto-sync com GitHub se token configurado

function recalculateKm() {
  for (let i = 0; i < TODOS.length; i++) {
    // SÃ³ recalcula km se estiver vazio (0), preservando km importado
    if (TODOS[i].km === 0) {
      const lastOdo = i > 0 ? TODOS[i - 1].odo : 0;
      TODOS[i].km = TODOS[i].odo - lastOdo;
      if (TODOS[i].km < 0) TODOS[i].km = 0;
    }
    TODOS[i].cons = TODOS[i].km > 0 ? (TODOS[i].km / TODOS[i].vol).toFixed(2) : 0;
  }
}

  };

}

async function ghGetFileSha() {
  const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.file}`;
  const r = await fetch(url, {headers: {Authorization: `token ${GH.token}`, Accept: 'application/vnd.github.v3+json'}});
  if (!r.ok) throw new Error('Erro ao buscar arquivo: ' + r.status);
  const d = await r.json();
  return {sha: d.sha, content: atob(d.content.replace(/\n/g,''))};
}

async function ghSaveData() {
  if (!GH.token) { toast('â  Configure o token GitHub primeiro'); return; }
  try {
    toast('â³ Sincronizando com GitHub...');
    const {sha, content} = await ghGetFileSha();
    // Injeta os dados atuais no HTML do repositÃ³rio
    const dadosJSON = JSON.stringify({
      todos: TODOS, config: CONFIG, manutencao: MANUTENCAO,
      historico: HISTORICO_CICLOS, trajetos: TRAJETOS, postos: POSTOS,
      ciclo1: CICLO1, ciclo2: CICLO2
    });
    // Substitui o bloco de dados sincronizados no HTML
    const marker_start = '/*__SYNC_DATA_START__*/';
    const marker_end = '/*__SYNC_DATA_END__*/';
    let newContent;
    if (content.includes(marker_start)) {
      newContent = content.replace(
        new RegExp(marker_start + '[\s\S]*?' + marker_end),
        marker_start + 'var __SYNC_DATA__=' + dadosJSON + ';' + marker_end
      );
    } else {
      newContent = content.replace(
        'loadData();',
        marker_start + 'var __SYNC_DATA__=null;' + marker_end + '\nloadData();'
      );
    }
    const encoded = btoa(unescape(encodeURIComponent(newContent)));
    const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.file}`;
    const r = await fetch(url, {
      method: 'PUT',
      headers: {Authorization: `token ${GH.token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json'},
      body: JSON.stringify({message: 'sync: ' + new Date().toLocaleString('pt-BR'), content: encoded, sha})
    });
    if (!r.ok) throw new Error('Erro ao salvar: ' + r.status);
    toast('â Dados sincronizados com GitHub!');
    renderSync();
  } catch(e) {
    toast('â Erro: ' + e.message);
    console.error(e);
  }
}

async function ghLoadData() {
  if (!GH.token) { toast('â  Configure o token GitHub primeiro'); return; }
  try {
    toast('â³ Carregando do GitHub...');
    const {content} = await ghGetFileSha();
    const marker_start = '/*__SYNC_DATA_START__*/';
    const marker_end = '/*__SYNC_DATA_END__*/';
    if (!content.includes(marker_start)) { toast('â  Nenhum dado sincronizado ainda'); return; }
    const match = content.match(/\/\*__SYNC_DATA_START__\*\/var __SYNC_DATA__=([\s\S]*?);\/\*__SYNC_DATA_END__\*\//);
    if (!match) { toast('â  Erro ao ler dados'); return; }
    const data = JSON.parse(match[1]);
    if (data.todos)      TODOS = data.todos;
    if (data.config)     CONFIG = data.config;

}

function importCSV() {
  const csv = document.getElementById('csv-input').value.trim();
  if (!csv) { toast('â  Cole os dados'); return; }

  const lines = csv.split('\n');
  const newTodos = [];
  let volumeParcialAcumulado = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    
    // Detecta separador (Tab ou VÃ­rgula)
    const sep = line.includes('\t') ? '\t' : ',';
    const cols = line.split(sep).map(c => c.trim().replace('R$', '').replace(/\./g, '').replace(',', '.'));

    // Mapeamento baseado na estrutura da planilha do usuÃ¡rio:
    // 0:Data, 1:OdÃ´metro, 2:PreÃ§o/L, 3:Vol Parcial, 4:Vol Completar, 5:Consumo, 6:Km, 7:Comb Consumido, 8:Comb Abastecido, 9:Total, 10:Posto
    
    const data = cols[0];
    const odo = parseInt(cols[1]) || 0;
    const pl = parseFloat(cols[2]) || 0;
    const volParcial = parseFloat(cols[3]) || 0;
    const volCompletar = parseFloat(cols[4]) || 0;
    const km = parseInt(cols[6]) || 0;
    const comb = cols[7] || cols[8] || 'Etanol';
    const total = parseFloat(cols[9]) || 0;
    const posto = cols[10] || '';
    
    console.log(`Linha ${i}: data=${data}, odo=${odo}, pl=${pl}, volParcial=${volParcial}, volCompletar=${volCompletar}, km=${km}, comb=${comb}, total=${total}`);

    // Se nÃ£o tem km (abastecimento parcial), acumula volume
    if (km === 0 && volParcial > 0) {
      volumeParcialAcumulado += volParcial;
      continue; // Pula para prÃ³xima linha
    }

    // Se tem km (abastecimento completo), soma com parciais acumulados
    const volTotal = volCompletar + volumeParcialAcumulado;
    
    if (data && volTotal > 0) {
      newTodos.push({
        data, odo, km, 
        vol: volTotal,
        cons: km > 0 ? (km / volTotal).toFixed(2) : 0, 
        comb: comb.includes('Gasolina') ? 'Gasolina' : 'Etanol', 
        total: total > 0 ? parseFloat(total.toFixed(2)) : (volTotal * pl),
        pl, posto, desc: ''
      });
      volumeParcialAcumulado = 0; // Reset para prÃ³ximo ciclo
    }
  }

  if (newTodos.length === 0) {
    toast('â  Nenhum dado vÃ¡lido encontrado.');
    return;
  }

  TODOS = newTodos;
  sortTodosChronologically();
  recalculateKm();
  saveData();
  toast('â ' + TODOS.length + ' registros importados!');
  document.getElementById('csv-input').value = '';
  go('abastecimentos');
}

function renderCicloHistorico(dados, titulo, elId) {
  if (!dados || dados.length === 0) {
    document.getElementById(elId).innerHTML = `<div class="sh"><span class="sh-title">${titulo}</span></div><div style="text-align:center;padding:40px;color:var(--muted);">Nenhum dado disponÃ­vel.</div>`;
    return;
  }
  const gasD = dados.filter(d => d.comb === 'Gasolina' && d.km > 0);
  const ethD = dados.filter(d => d.comb === 'Etanol' && d.km > 0);
  const gasKmL = gasD.length ? (gasD.reduce((a,d)=>a+d.km,0) / gasD.reduce((a,d)=>a+d.vol,0)).toFixed(2) : 'â';
  const ethKmL = ethD.length ? (ethD.reduce((a,d)=>a+d.km,0) / ethD.reduce((a,d)=>a+d.vol,0)).toFixed(2) : 'â';
  const totalGas = gasD.reduce((a,d)=>a+d.total,0).toFixed(2);
  const totalEth = ethD.reduce((a,d)=>a+d.total,0).toFixed(2);
  const totalKm = dados.reduce((a,d)=>a+d.km,0);
  const odoInicio = Math.min(...dados.map(d=>d.odo));
  const odoFim = Math.max(...dados.map(d=>d.odo));

  let html = `
    <div class="sh"><span class="sh-title">${titulo}</span></div>
    <div class="card">
      <div class="card-title">Resumo do Ciclo</div>
      <div class="stat">
        <div class="stat-item"><div class="stat-label">OdÃ´metro inÃ­cio</div><div class="stat-value">${odoInicio.toLocaleString('pt-BR')} km</div></div>
        <div class="stat-item"><div class="stat-label">OdÃ´metro fim</div><div class="stat-value">${odoFim.toLocaleString('pt-BR')} km</div></div>
        <div class="stat-item"><div class="stat-label">Total rodado</div><div class="stat-value">${totalKm.toLocaleString('pt-BR')} km</div></div>
        <div class="stat-item"><div class="stat-label">MÃ©dia Gasolina</div><div class="stat-value">${gasKmL} km/L</div></div>
        <div class="stat-item"><div class="stat-label">MÃ©dia Etanol</div><div class="stat-value">${ethKmL} km/L</div></div>
        <div class="stat-item"><div class="stat-label">Total Gasolina</div><div class="stat-value">R$ ${parseFloat(totalGas).toFixed(2)}</div></div>
        <div class="stat-item"><div class="stat-label">Total Etanol</div><div class="stat-value">R$ ${parseFloat(totalEth).toFixed(2)}</div></div>
        <div class="stat-item"><div class="stat-label">Total gasto</div><div class="stat-value">R$ ${(parseFloat(totalGas)+parseFloat(totalEth)).toFixed(2)}</div></div>
      </div>
    </div>
    <div class="sh" style="margin-top:8px;"><span class="sh-title">Abastecimentos (${dados.length})</span></div>
    <div class="list">`;

  const sorted = [...dados].reverse();
  sorted.forEach(d => {
    const cons = d.km > 0 ? (d.km / d.vol).toFixed(2) : '0.00';
    html += `
      <div class="list-item">
        <div class="list-item-title">
          <div style="font-weight:bold;">${d.data} Â· ${d.comb} Â· ${d.odo.toLocaleString('pt-BR')} km</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">${d.vol.toFixed(2)}L @ R$ ${d.pl.toFixed(2)}/L Â· <strong style="color:var(--primary)">${cons} km/L</strong> Â· ${d.km} km${d.posto ? ' Â· ' + d.posto : ''}${d.desc ? ' Â· ' + d.desc : ''}</div>
        </div>
      </div>`;
  });

  html += `</div>`;
  document.getElementById(elId).innerHTML = html;
}

function renderCiclo1() { renderCicloHistorico(CICLO1, 'ð Ciclo 1 Â· HistÃ³rico', 'sec-ciclo1'); }
function renderCiclo2() { renderCicloHistorico(CICLO2, 'ð Ciclo 2 Â· HistÃ³rico', 'sec-ciclo2'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
