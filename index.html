<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-CROSS Painel de Consumo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0e27;
      --bg2: #141829;
      --text: #e0e0e0;
      --muted: #888;
      --border: #333;
      --primary: #ffd700;
      --success: #4ade80;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    
    nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    
    .nav-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      font-size: 16px;
    }
    
    .nav-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
    }
    
    .tb {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .tb:hover { color: var(--text); border-color: var(--text); }
    .tb.on { background: var(--primary); color: var(--bg); border-color: var(--primary); }
    
    .nav-odo {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .sec { display: none; }
    .sec.on { display: block; }
    
    .sh {
      background: var(--bg2);
      border-left: 3px solid var(--primary);
      padding: 12px 16px;
      margin-bottom: 16px;
      border-radius: 4px;
    }
    
    .sh-title {
      font-weight: bold;
      font-size: 16px;
    }
    
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .card-title {
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 14px;
    }
    
    .stat {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .stat-item {
      background: var(--bg);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: var(--primary);
    }
    
    .editable {
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    .editable:hover {
      background: var(--border);
    }
    
    .editable input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--primary);
      color: var(--text);
      padding: 4px;
      border-radius: 4px;
      font-size: inherit;
    }
    
    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .list-item {
      background: var(--bg);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    
    .list-item-title {
      flex: 1;
    }
    
    .list-item-value {
      font-weight: bold;
      color: var(--primary);
      white-space: nowrap;
    }
    
    .btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .btn:hover { background: var(--border); }
    .btn.pr { background: var(--primary); color: var(--bg); border-color: var(--primary); }
    .btn.pr:hover { background: #ffed4e; }
    .btn.danger { background: var(--danger); border-color: var(--danger); }
    .btn.danger:hover { background: #dc2626; }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: var(--muted);
    }
    
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    
    .form-input:focus { outline: none; border-color: var(--primary); }
    
    .maint-item {
      background: var(--bg);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    
    .maint-check {
      width: 20px;
      height: 20px;
      cursor: pointer;
      margin-top: 2px;
    }
    
    .maint-content {
      flex: 1;
    }
    
    .maint-title {
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 4px;
    }
    
    .maint-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    
    .maint-item.done {
      opacity: 0.6;
      background: var(--bg2);
    }
    
    .maint-item.done .maint-title {
      text-decoration: line-through;
    }
    
    .maint-km {
      background: var(--bg2);
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 8px;
    }
    
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--success);
      color: var(--bg);
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
    }
    
    #toast.show { opacity: 1; }
    
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: bold;
      margin-left: 4px;
    }
    
    .badge.best {
      background: var(--success);
      color: var(--bg);
    }
    
    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .nav-tabs {
        width: 100%;
        overflow-x: auto;
      }
      
      .stat {
        grid-template-columns: repeat(2, 1fr);
      }
      
      main {
        padding: 12px;
      }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-title">
    <span>⬡ T-CROSS</span>
    <span style="font-size: 12px; color: var(--muted);">Painel de Consumo</span>
  </div>
  <div class="nav-tabs">
    <button class="tb on" onclick="go('dashboard')">Dashboard</button>
    <button class="tb" onclick="go('abastecimentos')">Abastecimentos</button>
    <button class="tb" onclick="go('trajetos')">Trajetos</button>
    <button class="tb" onclick="go('postos')">Postos</button>
    <button class="tb" onclick="go('ciclo1')">Ciclo 1</button>
    <button class="tb" onclick="go('ciclo2')">Ciclo 2</button>
    <button class="tb" onclick="go('manutencao')">Manutenção</button>
    <button class="tb" onclick="go('config')">Config</button>
    <button class="tb" onclick="go('sync')">Sincronizar</button>
  </div>
  <div class="nav-odo">⬡ <span id="nav-odo">0</span> km</div>
</nav>

<main>
  <div class="sec on" id="sec-dashboard"></div>
  <div class="sec" id="sec-abastecimentos"></div>
  <div class="sec" id="sec-trajetos"></div>
  <div class="sec" id="sec-postos"></div>
  <div class="sec" id="sec-ciclo1"></div>
  <div class="sec" id="sec-ciclo2"></div>
  <div class="sec" id="sec-manutencao"></div>
  <div class="sec" id="sec-config"></div>
  <div class="sec" id="sec-sync"></div>
</main>

<div id="toast"></div>

<script>
// ══════════════════════════════ DADOS ══════════════════════════════
let HISTORICO_CICLOS = [];
let TODOS = [];
let TRAJETOS = [];
let POSTOS = [];
let CICLO1 = [];
let CICLO2 = [];
let CONFIG = {
  gasPrice: 7.12,
  ethPrice: 5.05,
  gasConsume: 10.21,
  ethConsume: 9.25,
  nextReview: 30000,
  favGasStation: '',
  favGasEthPrice: 5.05,
  favGasGasPrice: 7.12
};

let MANUTENCAO = [
  {title: 'Troca de Óleo e Filtro', freq: 10000, desc: 'Essencial para manter o motor saudável', done: false},
  {title: 'Verificação do Nível de Óleo', freq: 1000, desc: 'Verificar se está no nível correto', done: false},
  {title: 'Nivelação e Balanceamento de Pneus', freq: 10000, desc: 'Junto com a troca de óleo', done: false},
  {title: 'Italian Tune-up (Limpeza Preventiva)', freq: 3000, desc: 'Crucial para o TSI: Combate o acúmulo de carbono nas válvulas', done: false},
  {title: 'Troca do Ar do Motor', freq: 10000, desc: 'Manter o filtro limpo', done: false},
  {title: 'Filtro de Combustível', freq: 10000, desc: 'Essencial para injeção', done: false},
  {title: 'Verificação do Freio', freq: 10000, desc: 'Pastilhas e discos', done: false}
];

// ══════════════════════════════ STORAGE ══════════════════════════════
function saveData() {
  localStorage.setItem('tcross-todos', JSON.stringify(TODOS));
  localStorage.setItem('tcross-config', JSON.stringify(CONFIG));
  localStorage.setItem('tcross-manutencao', JSON.stringify(MANUTENCAO));
  localStorage.setItem('tcross-historico', JSON.stringify(HISTORICO_CICLOS));
  localStorage.setItem('tcross-trajetos', JSON.stringify(TRAJETOS));
  localStorage.setItem('tcross-postos', JSON.stringify(POSTOS));
  localStorage.setItem('tcross-ciclo1', JSON.stringify(CICLO1));
  localStorage.setItem('tcross-ciclo2', JSON.stringify(CICLO2));
}

function loadData() {
  const t = localStorage.getItem('tcross-todos');
  const c = localStorage.getItem('tcross-config');
  const m = localStorage.getItem('tcross-manutencao');
  const h = localStorage.getItem('tcross-historico');
  const tr = localStorage.getItem('tcross-trajetos');
  const p = localStorage.getItem('tcross-postos');
  const c1 = localStorage.getItem('tcross-ciclo1');
  const c2 = localStorage.getItem('tcross-ciclo2');
  if (t) TODOS = JSON.parse(t);
  if (c) CONFIG = JSON.parse(c);
  if (m) MANUTENCAO = JSON.parse(m);
  if (h) HISTORICO_CICLOS = JSON.parse(h);
  if (tr) TRAJETOS = JSON.parse(tr);
  if (p) POSTOS = JSON.parse(p);
  if (c1) CICLO1 = JSON.parse(c1);
  if (c2) CICLO2 = JSON.parse(c2);
  
  // Garante ordenação cronológica ao carregar
  sortTodosChronologically();
}

// ══════════════════════════════ NAVIGATION ══════════════════════════════
function go(id) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.getElementById('sec-' + id).classList.add('on');
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  const btn = document.querySelector(`[onclick="go('${id}')"]`);
  if (btn) btn.classList.add('on');
  
  const maxOdo = TODOS.length > 0 ? Math.max(...TODOS.map(d => d.odo)) : 0;
  document.getElementById('nav-odo').textContent = maxOdo.toLocaleString('pt-BR');
  
  ({dashboard: renderDash, abastecimentos: renderAbast, manutencao: renderMaint, config: renderConfig, sync: renderSync}[id] || function(){})();
}

// ══════════════════════════════ HELPERS ══════════════════════════════
function parseDate(dateStr) {
  if (!dateStr) return new Date(0);
  const parts = dateStr.split('/');
  if (parts.length < 2) return new Date(0);
  const day = parseInt(parts[0]);
  const month = parseInt(parts[1]) - 1;
  const year = parts.length === 3 ? parseInt(parts[2]) : new Date().getFullYear();
  return new Date(year, month, day);
}

function sortTodosChronologically() {
  TODOS.sort((a, b) => {
    const dateA = parseDate(a.data);
    const dateB = parseDate(b.data);
    if (dateA.getTime() !== dateB.getTime()) return dateA - dateB;
    return a.odo - b.odo;
  });
}

function getLastAbastecimento() {
  return TODOS.length > 0 ? TODOS[TODOS.length - 1] : null;
}

function getAverageConsumption(comb) {
  const filtered = TODOS.filter(d => d.comb === comb && d.km > 0);
  if (filtered.length === 0) return 0;
  return (filtered.reduce((a, d) => a + d.km, 0) / filtered.reduce((a, d) => a + d.vol, 0)).toFixed(2);
}

function getCostPerKm(comb) {
  const filtered = TODOS.filter(d => d.comb === comb);
  const totalCost = filtered.reduce((a, d) => a + d.total, 0);
  const totalKm = filtered.reduce((a, d) => a + d.km, 0);
  if (totalKm === 0) return 0;
  return (totalCost / totalKm).toFixed(3);
}

function getBestFuel() {
  const gasCpk = parseFloat(getCostPerKm('Gasolina')) || 0;
  const ethCpk = parseFloat(getCostPerKm('Etanol')) || 0;
  if (gasCpk === 0 && ethCpk === 0) return null;
  if (gasCpk === 0) return 'Etanol';
  if (ethCpk === 0) return 'Gasolina';
  return ethCpk < gasCpk ? 'Etanol' : 'Gasolina';
}

function getEficienciaRelativa() {
  const gasAvg = parseFloat(getAverageConsumption('Gasolina')) || 0;
  const ethAvg = parseFloat(getAverageConsumption('Etanol')) || 0;
  if (gasAvg === 0) return 0;
  return ((ethAvg / gasAvg) * 100).toFixed(1);
}

function getRelacaoPrecos() {
  const gasPl = CONFIG.gasPrice;
  const ethPl = CONFIG.ethPrice;
  if (gasPl === 0) return 0;
  return ((ethPl / gasPl) * 100).toFixed(1);
}

// ══════════════════════════════ DASHBOARD ══════════════════════════════
function renderDash() {
  const gasAvg = getAverageConsumption('Gasolina');
  const ethAvg = getAverageConsumption('Etanol');
  const gasCostPerKm = getCostPerKm('Gasolina');
  const ethCostPerKm = getCostPerKm('Etanol');
  const bestFuel = getBestFuel();
  
  const lastAbast = getLastAbastecimento();
  const lastData = lastAbast ? lastAbast.data : '-';
  const lastComb = lastAbast ? lastAbast.comb : '-';
  const lastConsumption = lastAbast && lastAbast.km > 0 ? (lastAbast.km / lastAbast.vol).toFixed(2) : '0.00';
  const lastPrice = lastAbast ? lastAbast.pl.toFixed(2) : '0.00';
  
  const totalGas = TODOS.filter(d => d.comb === 'Gasolina').reduce((a, d) => a + d.total, 0).toFixed(2);
  const totalEth = TODOS.filter(d => d.comb === 'Etanol').reduce((a, d) => a + d.total, 0).toFixed(2);
  const totalCost = (parseFloat(totalGas) + parseFloat(totalEth)).toFixed(2);
  
  const currentOdo = TODOS.length > 0 ? Math.max(...TODOS.map(d => d.odo)) : 0;
  const kmFaltam = CONFIG.nextReview - currentOdo;
  
  const eficRel = getEficienciaRelativa();
  const relPrecos = getRelacaoPrecos();
  const lastOdo = lastAbast ? lastAbast.odo.toLocaleString('pt-BR') : '-';
  const cicloNum = HISTORICO_CICLOS.length + 1;

  const html = `
    <div class="sh"><span class="sh-title">📊 Dashboard · Ciclo ${cicloNum}</span></div>
    
    <div class="card">
      <div class="card-title">⚡ Consumo Médio por Combustível</div>
      <div class="stat">
        <div class="stat-item">
          <div class="stat-label">Gasolina</div>
          <div class="stat-value">${gasAvg} km/L</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Etanol</div>
          <div class="stat-value">${ethAvg} km/L</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Eficiência relativa: ${eficRel}% da gasolina</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-title">⛽ Último Abastecimento</div>
      <div class="stat">
        <div class="stat-item">
          <div class="stat-label">Data</div>
          <div class="stat-value">${lastData}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Odômetro</div>
          <div class="stat-value">${lastOdo} km</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Combustível</div>
          <div class="stat-value">${lastComb}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Média</div>
          <div class="stat-value">${lastConsumption} km/L</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Preço/L</div>
          <div class="stat-value">R$ ${lastPrice}</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-title">💰 Custo por km · Combustível mais econômico</div>
      <div class="stat">
        <div class="stat-item">
          <div class="stat-label">Gasolina</div>
          <div class="stat-value">R$ ${gasCostPerKm}/km ${bestFuel === 'Gasolina' ? '<span class="badge best">✓ MELHOR</span>' : ''}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Etanol</div>
          <div class="stat-value">R$ ${ethCostPerKm}/km ${bestFuel === 'Etanol' ? '<span class="badge best">✓ MELHOR</span>' : ''}</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px;padding:8px;background:var(--bg);border-radius:4px;">
        Eficiência relativa: <strong style="color:var(--primary)">${eficRel}%</strong> · 
        Relação de preços: <strong style="color:var(--primary)">${relPrecos}%</strong> · 
        Decisão baseada em custo real por km rodado
      </div>
    </div>
    
    <div class="card">
      <div class="card-title">🔧 Próxima Revisão</div>
      <div class="stat">
        <div class="stat-item">
          <div class="stat-label">Odômetro atual</div>
          <div class="stat-value">${currentOdo.toLocaleString('pt-BR')} km</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Revisão prevista</div>
          <div class="stat-value">${CONFIG.nextReview.toLocaleString('pt-BR')} km</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Faltam</div>
          <div class="stat-value" style="color:${kmFaltam < 1000 ? 'var(--danger)' : kmFaltam < 3000 ? 'var(--warning)' : 'var(--success)'}">${kmFaltam.toLocaleString('pt-BR')} km</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-title">📋 Custo Total do Ciclo ${cicloNum}</div>
      <div class="stat">
        <div class="stat-item">
          <div class="stat-label">Gasolina</div>
          <div class="stat-value">R$ ${parseFloat(totalGas).toFixed(2)}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Etanol</div>
          <div class="stat-value">R$ ${parseFloat(totalEth).toFixed(2)}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Total</div>
          <div class="stat-value">R$ ${totalCost}</div>
        </div>
      </div>
    </div>
  `;
  
  document.getElementById('sec-dashboard').innerHTML = html;
}

// ══════════════════════════════ ABASTECIMENTOS ══════════════════════════════
let sortOrder = 'desc'; // Padrão: mais recentes primeiro

function renderAbast() {
  let html = `
    <div class="sh"><span class="sh-title">⛽ Abastecimentos</span></div>
    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
      <button class="btn pr" style="flex: 1;" onclick="addAbast()">+ Adicionar</button>
      <button class="btn" onclick="toggleSort()" title="Inverter ordem">↕ Ordem (${sortOrder === 'asc' ? 'Antigos' : 'Recentes'})</button>
    </div>
    <div class="list">
  `;
  
  // Cria uma cópia para exibição sem alterar o array original que deve estar sempre em ordem cronológica para cálculos
  const displayList = [...TODOS];
  if (sortOrder === 'desc') displayList.reverse();

  displayList.forEach((d) => {
    // Encontra o índice real no array TODOS para edição/exclusão
    const realIndex = TODOS.indexOf(d);
    const consumo = d.km > 0 ? (d.km / d.vol).toFixed(2) : '0.00';
    
    html += `
      <div class="list-item">
        <div class="list-item-title">
          <div style="font-weight: bold;">${d.data} · ${d.comb} · ${d.odo.toLocaleString('pt-BR')} km</div>
          <div style="font-size: 11px; color: var(--muted); margin-top: 2px;">
            ${d.vol.toFixed(2)}L @ R$ ${d.pl.toFixed(2)}/L · Média: <strong style="color:var(--primary)">${consumo} km/L</strong> · ${d.km} km percorridos
          </div>
        </div>
        <div style="display: flex; gap: 8px;">
          <button class="btn" onclick="editAbast(${realIndex})">✎</button>
          <button class="btn danger" onclick="delAbast(${realIndex})">✕</button>
        </div>
      </div>
    `;
  });
  
  if (TODOS.length === 0) {
    html += `<div style="text-align:center; padding: 40px; color: var(--muted);">Nenhum abastecimento registrado.</div>`;
  }

  html += `</div>`;
  document.getElementById('sec-abastecimentos').innerHTML = html;
}

function toggleSort() {
  sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
  renderAbast();
  toast(sortOrder === 'asc' ? '↑ Ordem cronológica' : '↓ Ordem reversa');
}

function addAbast() {
  const data = prompt('Data (dd/mm):');
  if (!data) return;
  
  const odo = prompt('Odômetro (km):');
  if (!odo || isNaN(odo)) return;
  
  const vol = prompt('Volume (L):');
  if (!vol || isNaN(vol)) return;
  
  const comb = prompt('Combustível (Gasolina/Etanol):', 'Etanol');
  if (!comb) return;
  
  const pl = prompt('Preço do Combustível (R$/L):');
  if (!pl || isNaN(pl)) return;
  
  const newAbast = {
    data, 
    odo: parseInt(odo), 
    km: 0, 
    vol: parseFloat(vol), 
    cons: 0,
    comb, 
    total: (parseFloat(vol) * parseFloat(pl)).toFixed(2), 
    pl: parseFloat(pl), 
    posto: '', 
    desc: ''
  };

  TODOS.push(newAbast);
  sortTodosChronologically();
  recalculateKm();
  saveData();
  toast('✓ Adicionado');
  renderAbast();
  renderDash();
}

function recalculateKm() {
  for (let i = 0; i < TODOS.length; i++) {
    // Só recalcula km se estiver vazio (0), preservando km importado
    if (TODOS[i].km === 0) {
      const lastOdo = i > 0 ? TODOS[i - 1].odo : 0;
      TODOS[i].km = TODOS[i].odo - lastOdo;
      if (TODOS[i].km < 0) TODOS[i].km = 0;
    }
    TODOS[i].cons = TODOS[i].km > 0 ? (TODOS[i].km / TODOS[i].vol).toFixed(2) : 0;
  }
}

function editAbast(i) {
  const d = TODOS[i];
  const data = prompt('Data:', d.data);
  if (data === null) return;
  
  const odo = prompt('Odômetro:', d.odo);
  if (odo === null) return;
  
  const vol = prompt('Volume:', d.vol);
  if (vol === null) return;
  
  const pl = prompt('Preço:', d.pl);
  if (pl === null) return;
  
  TODOS[i] = {
    ...d, 
    data, 
    odo: parseInt(odo), 
    vol: parseFloat(vol),
    pl: parseFloat(pl),
    total: (parseFloat(vol) * parseFloat(pl)).toFixed(2)
  };
  
  sortTodosChronologically();
  recalculateKm();
  saveData();
  toast('✓ Atualizado');
  renderAbast();
  renderDash();
}

function delAbast(i) {
  if (confirm('Remover abastecimento?')) {
    TODOS.splice(i, 1);
    recalculateKm();
    saveData();
    toast('✓ Removido');
    renderAbast();
    renderDash();
  }
}

// ══════════════════════════════ MANUTENÇÃO ══════════════════════════════
function renderMaint() {
  const currentOdo = TODOS.length > 0 ? Math.max(...TODOS.map(d => d.odo)) : 0;
  const cicloNum = HISTORICO_CICLOS.length + 1;
  const kmFaltamRevisao = CONFIG.nextReview - currentOdo;
  const doneCount = MANUTENCAO.filter(m => m.done).length;
  const totalCount = MANUTENCAO.length;
  
  let html = `
    <div class="sh"><span class="sh-title">🔧 Manutenção · Ciclo ${cicloNum}</span></div>
    
    <div class="card">
      <div class="card-title">Próxima Revisão</div>
      <div class="stat">
        <div class="stat-item">
          <div class="stat-label">Odômetro atual</div>
          <div class="stat-value">${currentOdo.toLocaleString('pt-BR')} km</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Revisão prevista em</div>
          <div class="stat-value">${CONFIG.nextReview.toLocaleString('pt-BR')} km</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Faltam</div>
          <div class="stat-value" style="color:${kmFaltamRevisao < 1000 ? 'var(--danger)' : kmFaltamRevisao < 3000 ? 'var(--warning)' : 'var(--success)'}">${kmFaltamRevisao.toLocaleString('pt-BR')} km</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="card-title" style="margin-bottom:0">Checklist · ${doneCount}/${totalCount} concluídos</div>
        <button class="btn" onclick="renovarChecklist()" title="Renovar para novo ciclo">🔄 Novo ciclo</button>
      </div>
      <div class="list">
  `;
  
  MANUTENCAO.forEach((m, i) => {
    const kmDesdeInicio = currentOdo % m.freq;
    const kmFaltamItem = m.freq - kmDesdeInicio;
    const percentual = (kmDesdeInicio / m.freq * 100).toFixed(0);
    const urgente = kmFaltamItem < m.freq * 0.1;
    
    html += `
      <div class="maint-item ${m.done ? 'done' : ''}">
        <input type="checkbox" class="maint-check" ${m.done ? 'checked' : ''} onchange="toggleMaint(${i})">
        <div class="maint-content">
          <div class="maint-title">${m.title}</div>
          <div class="maint-desc">${m.desc}</div>
          <div class="maint-km" style="${urgente && !m.done ? 'border-left: 3px solid var(--danger); padding-left: 8px;' : ''}">
            <strong>Frequência:</strong> a cada ${m.freq.toLocaleString('pt-BR')} km · 
            <strong>Faltam:</strong> <span style="color:${urgente ? 'var(--danger)' : 'var(--success)'}">${kmFaltamItem.toLocaleString('pt-BR')} km</span> · 
            <strong>Progresso:</strong> ${percentual}%
          </div>
        </div>
      </div>
    `;
  });
  
  html += `</div></div>`;
  document.getElementById('sec-manutencao').innerHTML = html;
}

function renovarChecklist() {
  if (!confirm('Encerrar ciclo atual e iniciar novo checklist?')) return;
  const cicloNum = HISTORICO_CICLOS.length + 1;
  HISTORICO_CICLOS.push({
    ciclo: cicloNum,
    abastecimentos: [...TODOS],
    revisaoKm: TODOS.length > 0 ? Math.max(...TODOS.map(d => d.odo)) : 0,
    data: new Date().toLocaleDateString('pt-BR')
  });
  MANUTENCAO = MANUTENCAO.map(m => ({...m, done: false}));
  CONFIG.nextReview = (TODOS.length > 0 ? Math.max(...TODOS.map(d => d.odo)) : 0) + 10000;
  saveData();
  toast('✓ Novo ciclo iniciado!');
  renderMaint();
  renderDash();
}

function toggleMaint(i) {
  MANUTENCAO[i].done = !MANUTENCAO[i].done;
  saveData();
  renderMaint();
}

// ══════════════════════════════ CONFIGURAÇÃO ══════════════════════════════
function renderConfig() {
  const currentOdo = TODOS.length > 0 ? Math.max(...TODOS.map(d => d.odo)) : 0;
  const html = `
    <div class="sh"><span class="sh-title">⚙️ Configuração</span></div>
    <div class="card">
      <div class="card-title">Preços de Combustível</div>
      <div class="form-group">
        <label class="form-label">Gasolina (R$/L)</label>
        <input type="number" class="form-input" id="cfg-gas" value="${CONFIG.gasPrice}" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Etanol (R$/L)</label>
        <input type="number" class="form-input" id="cfg-eth" value="${CONFIG.ethPrice}" step="0.01">
      </div>
    </div>
    <div class="card">
      <div class="card-title">Próxima Revisão</div>
      <div class="form-group">
        <label class="form-label">Próxima revisão em (km)</label>
        <input type="number" class="form-input" id="cfg-review" value="${CONFIG.nextReview}">
      </div>
      <div style="background: var(--bg); padding: 12px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 12px;">
        <div style="font-size: 12px; color: var(--muted); margin-bottom: 4px;">Odômetro atual</div>
        <div style="font-size: 18px; font-weight: bold; color: var(--primary);">${currentOdo.toLocaleString('pt-BR')} km</div>
      </div>
    </div>
    <button class="btn pr" style="width: 100%;" onclick="saveConfig()">✓ Salvar Configurações</button>
  `;
  document.getElementById('sec-config').innerHTML = html;
}

function saveConfig() {
  CONFIG.gasPrice = parseFloat(document.getElementById('cfg-gas').value);
  CONFIG.ethPrice = parseFloat(document.getElementById('cfg-eth').value);
  CONFIG.nextReview = parseInt(document.getElementById('cfg-review').value);
  saveData();
  toast('✓ Salvo');
  renderDash();
}

// ══════════════════════════════ SINCRONIZAÇÃO ══════════════════════════════
function renderSync() {
  const html = `
    <div class="sh"><span class="sh-title">📥 Importar da Planilha</span></div>
    <div class="card">
      <div class="card-title">Cole os dados da planilha aqui</div>
      <textarea id="csv-input" class="form-input" style="height: 150px; font-family: monospace; font-size: 12px;" placeholder="Data	Odômetro	Preço/L	Volume Parcial	Volume Completar	Consumo	Km Percorridos	Combustível Consumido	Combustível abastecido	Preço Total	Posto"></textarea>
      <div style="font-size: 12px; color: var(--muted); margin-top: 8px;">
        ℹ️ Suporta copiar e colar direto da sua planilha (TSV). A primeira linha (cabeçalho) será ignorada.
      </div>
      <button class="btn pr" style="margin-top: 12px; width: 100%;" onclick="importCSV()">✓ Importar</button>
    </div>
  `;
  document.getElementById('sec-sync').innerHTML = html;
}

function importCSV() {
  const csv = document.getElementById('csv-input').value.trim();
  if (!csv) { toast('⚠ Cole os dados'); return; }

  const lines = csv.split('\n');
  const newTodos = [];
  let volumeParcialAcumulado = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    
    // Detecta separador (Tab ou Vírgula)
    const sep = line.includes('\t') ? '\t' : ',';
    const cols = line.split(sep).map(c => c.trim().replace('R$', '').replace(/\./g, '').replace(',', '.'));

    // Mapeamento baseado na estrutura da planilha do usuário:
    // 0:Data, 1:Odômetro, 2:Preço/L, 3:Vol Parcial, 4:Vol Completar, 5:Consumo, 6:Km, 7:Comb Consumido, 8:Comb Abastecido, 9:Total, 10:Posto
    
    const data = cols[0];
    const odo = parseInt(cols[1]) || 0;
    const pl = parseFloat(cols[2]) || 0;
    const volParcial = parseFloat(cols[3]) || 0;
    const volCompletar = parseFloat(cols[4]) || 0;
    const km = parseInt(cols[6]) || 0;
    const comb = cols[7] || cols[8] || 'Etanol';
    const total = parseFloat(cols[9]) || 0;
    const posto = cols[10] || '';
    
    console.log(`Linha ${i}: data=${data}, odo=${odo}, pl=${pl}, volParcial=${volParcial}, volCompletar=${volCompletar}, km=${km}, comb=${comb}, total=${total}`);

    // Se não tem km (abastecimento parcial), acumula volume
    if (km === 0 && volParcial > 0) {
      volumeParcialAcumulado += volParcial;
      continue; // Pula para próxima linha
    }

    // Se tem km (abastecimento completo), soma com parciais acumulados
    const volTotal = volCompletar + volumeParcialAcumulado;
    
    if (data && volTotal > 0) {
      newTodos.push({
        data, odo, km, 
        vol: volTotal,
        cons: km > 0 ? (km / volTotal).toFixed(2) : 0, 
        comb: comb.includes('Gasolina') ? 'Gasolina' : 'Etanol', 
        total: total > 0 ? parseFloat(total.toFixed(2)) : (volTotal * pl),
        pl, posto, desc: ''
      });
      volumeParcialAcumulado = 0; // Reset para próximo ciclo
    }
  }

  if (newTodos.length === 0) {
    toast('⚠ Nenhum dado válido encontrado.');
    return;
  }

  TODOS = newTodos;
  sortTodosChronologically();
  recalculateKm();
  saveData();
  toast('✓ ' + TODOS.length + ' registros importados!');
  document.getElementById('csv-input').value = '';
  go('abastecimentos');
}

// ══════════════════════════════ UTILS ══════════════════════════════
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

loadData();
go('dashboard');
