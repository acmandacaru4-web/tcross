*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--card:#1e2230;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --accent:#e8f040;--blue:#40c8f0;--orange:#f07040;--green:#40f0a8;--purple:#c07af0;--red:#f04060;
  --text:#f0f2f8;--muted:#6a7090;--muted2:#9aa0c0;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;font-size:17px}
nav{position:sticky;top:0;z-index:200;background:rgba(13,15,20,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 16px;gap:16px}
.nav-brand{display:flex;align-items:center;gap:9px;flex-shrink:0}
.nav-logo{width:28px;height:28px;background:var(--accent);border-radius:7px;display:grid;place-items:center;font-size:16px;font-weight:800;color:#0d0f14;flex-shrink:0}
.brand-name{font-size:16px;font-weight:800;letter-spacing:.07em;color:var(--text)}
.brand-sub{font-size:17px;color:var(--muted);font-family:var(--mono);letter-spacing:.06em}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1}
.nav-tabs::-webkit-scrollbar{display:none}
.tb{background:none;border:none;color:var(--muted);font-family:var(--font);font-size:17px;font-weight:700;padding:5px 11px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.05em}
.tb:hover{color:var(--text);background:var(--bg3)}
.tb.on{color:#0d0f14;background:var(--accent)}
.nav-odo{font-family:var(--mono);font-size:17px;color:var(--muted);flex-shrink:0}
.nav-odo span{color:var(--accent)}
main{max-width:1020px;margin:0 auto;padding:20px 14px 80px}
.sec{display:none}
.sec.on{display:block;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sh-title{font-size:17px;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.sh-actions{display:flex;gap:6px}
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}

.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s}
.sc:hover{border-color:var(--border2)}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c,var(--accent))}
.sc-label{font-size:16px;font-family:var(--mono);color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.sc-val{font-size:28px;font-weight:800;color:var(--c,var(--accent));line-height:1}
.sc-sub{font-size:16px;color:var(--muted);margin-top:5px;font-family:var(--mono)}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}

.cc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.cc-title{font-size:15px;font-weight:700;margin-bottom:14px}
.cw{position:relative;width:100%}
.fb{display:inline-flex;align-items:center;gap:4px;font-size:16px;font-family:var(--mono);padding:2px 8px;border-radius:20px;white-space:nowrap}
.fb.gas{background:rgba(232,240,64,.12);color:#e8f040}
.fb.eth{background:rgba(64,240,168,.12);color:#40f0a8}

.fb.gas .dot{background:#e8f040}
.fb.eth .dot{background:#40f0a8}
.cbadge{display:inline-flex;align-items:center;font-size:16px;font-family:var(--mono);padding:2px 8px;border-radius:20px}

.c2b{background:rgba(192,122,240,.12);color:#c07af0}
.c3b{background:rgba(240,240,64,.12);color:#e8f040}
.tw{overflow-x:auto;border-radius:12px;border:1px solid var(--border);margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:15px}
thead tr{border-bottom:1px solid var(--border)}
th{text-align:left;padding:12px 14px;font-family:var(--mono);font-size:16px;color:var(--muted);font-weight:500;letter-spacing:.06em;text-transform:uppercase;background:var(--bg2);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}
td.n{font-family:var(--mono);font-size:17px}
td.g{color:var(--green);font-family:var(--mono);font-size:17px}
td.r{color:var(--orange);font-family:var(--mono);font-size:17px}
.btn{background:none;border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--font);font-size:17px;font-weight:700;padding:6px 13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg3)}
.btn.pr{background:var(--accent);color:#0d0f14;border-color:transparent}
.btn.pr:hover{opacity:.85}
.btn.sm{padding:4px 9px;font-size:16px}
.btn.danger{border-color:rgba(240,64,96,.3);color:var(--red)}
.btn.danger:hover{background:rgba(240,64,96,.1)}
.filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;align-items:center}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:17px;padding:5px 10px;outline:none;cursor:pointer}
.fsel option{background:var(--bg2)}
.sinp{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:17px;padding:5px 10px;outline:none;width:180px}
.sinp:focus{border-color:var(--accent)}

.form-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.fi{display:flex;flex-direction:column;gap:5px}
.fi label{font-size:16px;font-family:var(--mono);color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.fi input,.fi select{background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:16px;padding:8px 11px;outline:none;transition:border-color .15s;width:100%}

.fi select option{background:var(--bg2)}
.fi.s2{grid-column:1/-1}
.factions{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.fbk{font-size:17px;font-family:var(--mono);color:var(--green);display:none}
.route-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:18px}
.rc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;transition:border-color .2s}

.drop-title{font-size:17px;font-weight:700;margin-bottom:5px}
.drop-sub{font-size:17px;font-family:var(--mono);color:var(--muted)}

.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
@media(max-width:480px){.exp-grid{grid-template-columns:1fr}}
.exp-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.exp-icon{font-size:28px;margin-bottom:10px}
.exp-title{font-size:16px;font-weight:700;margin-bottom:6px}
.exp-desc{font-size:17px;font-family:var(--mono);color:var(--muted);margin-bottom:14px;line-height:1.5}
.pbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;border-radius:3px;transition:width .4s}
.calc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px}
.calc-res{background:var(--bg3);border-radius:10px;padding:16px;text-align:center}

.calc-res-val{font-size:26px;font-weight:800}
#toast{position:fixed;bottom:24px;right:20px;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:15px;font-family:var(--mono);color:var(--text);z-index:999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
</style>

  const odos=REVISOES.map(r=>r.odo).sort((a,b)=>a-b);
  TODOS.forEach(d=>{let c=odos.length+1;for(let i=0;i<odos.length;i++){if(d.odo<=odos[i]){c=i+1;break}}d.ciclo=c});
}

function cicloAtual(){
  const maxOdo=Math.max(...TODOS.map(d=>d.odo));
  const odos=REVISOES.map(r=>r.odo).sort((a,b)=>a-b);
  let c=odos.length+1;for(let i=0;i<odos.length;i++){if(maxOdo<=odos[i]){c=i+1;break}}return c;
}

  const odos=[0,...REVISOES.map(r=>r.odo).sort((a,b)=>a-b)];

  return{inicio,fimRev,proxPrev:fimRev||(inicio+10000)};
}

function calcS(arr){
  const v=arr.filter(d=>d.km>0&&d.vol>0&&d.cons>0);
  const gas=v.filter(d=>d.comb==='Gasolina'),eth=v.filter(d=>d.comb==='Etanol');
  const tKm=arr.reduce((a,d)=>a+d.km,0),tVol=arr.reduce((a,d)=>a+d.vol,0),tGasto=arr.reduce((a,d)=>a+d.total,0);
  const consG=tVol>0?tKm/tVol:0;
  // Médias por COMBUSTÍVEL CONSUMIDO (combC), não pelo abastecido
  // Usa combC se disponível, senão comb (ciclos antigos)
  const gasC=v.filter(d=>(d.combC||d.comb)==='Gasolina');
  const ethC=v.filter(d=>(d.combC||d.comb)==='Etanol');
  // Média ponderada: km totais / litros totais por combustível consumido
  const gasKm=gasC.reduce((a,d)=>a+d.km,0),gasVol=gasC.reduce((a,d)=>a+d.vol,0);
  const ethKm=ethC.reduce((a,d)=>a+d.km,0),ethVol=ethC.reduce((a,d)=>a+d.vol,0);
  const mGas=gasVol>0?gasKm/gasVol:0;
  const mEth=ethVol>0?ethKm/ethVol:0;
  // Preço médio ponderado pelo volume do combustível ABASTECIDO
  const pGas=gasVol>0?gas.reduce((a,d)=>a+(d.pl*d.vol),0)/Math.max(gas.reduce((a,d)=>a+d.vol,0),1):0;
  const pEth=ethVol>0?eth.reduce((a,d)=>a+(d.pl*d.vol),0)/Math.max(eth.reduce((a,d)=>a+d.vol,0),1):0;
  const corteReal=mGas>0&&mEth>0?mEth/mGas:0.704;
  return{v,gas,eth,tKm,tVol,tGasto,consG,mGas,mEth,pGas,pEth,ckGas:pGas&&mGas?pGas/mGas:0,ckEth:pEth&&mEth?pEth/mEth:0,corteReal};
}

    pGas: s.pGas, pEth: s.pEth,
    gasManual: MEDIAS_USER.gasManual!==null,
    ethManual: MEDIAS_USER.ethManual!==null,
    sGas: s.mGas, sEth: s.mEth
  };
}

  const label=tipo==='gas'?'Gasolina':'Etanol';
  const val=prompt(
    label+' — média ponderada calculada: '+fmtN(calc)+' km/L\nDigite um valor manual ou deixe vazio para usar a média calculada:',
    tipo==='gas'?(MEDIAS_USER.gasManual||''):(MEDIAS_USER.ethManual||'')
  );
  if(val===null)return;
  if(val.trim()===''){
    if(tipo==='gas')MEDIAS_USER.gasManual=null;
    else MEDIAS_USER.ethManual=null;
    toast('Voltando para média ponderada calculada');
  } else {
    const n=parseFloat(val.replace(',','.'));
    if(isNaN(n)||n<=0){toast('Valor inválido');return}

    else MEDIAS_USER.ethManual=n;
    toast('✓ Consumo '+label+' definido como '+fmtN(n)+' km/L');
  }
  saveMediasUser(MEDIAS_USER);
  renderDash();
}

function renderAbast(){
  document.getElementById('sec-abastecimentos').innerHTML=`

      <div class="fg">
        <div class="fi"><label>Data</label><input id="f-dt" placeholder="dd/mm"></div>
        <div class="fi"><label>Odômetro (km)</label><input id="f-odo" type="number" placeholder="20700"></div>

        <div class="fi"><label>Posto</label><input id="f-posto" placeholder="Pel"></div>
        <div class="fi s2"><label>Descrição</label><input id="f-desc"></div>
      </div>
      <div class="factions">
        <button class="btn pr" onclick="salvarAbast()">Salvar registro</button>
        <button class="btn" onclick="toggleForm()">Cancelar</button>
        <span class="fbk" id="fbk">✓ Salvo!</span>
      </div>
    </div>
  </div>
  <div class="filters">
    <select class="fsel" onchange="fCiclo=this.value;renderTabela()">
      <option value="todos">Todos os ciclos</option>
      <option value="1">1º Ciclo</option>
      <option value="2">2º Ciclo</option>
      <option value="3">3º Ciclo</option>
    </select>
    <select class="fsel" onchange="fComb=this.value;renderTabela()">
      <option value="todos">Todos combustíveis</option>
      <option value="Gasolina">Gasolina</option>
      <option value="Etanol">Etanol</option>
    </select>
    <input class="sinp" placeholder="Buscar posto ou descrição…" oninput="fBusca=this.value;renderTabela()">
    <button id="btn-ordem" class="btn sm" onclick="toggleOrdem()" style="font-family:var(--mono)">↓ Mais recente</button>
    <span id="cnt-lbl" style="font-size:14px;font-family:var(--mono);color:var(--muted)"></span>
  </div>
  <div class="tw"><table><thead><tr><th>#</th><th>Ciclo</th><th>Data</th><th>Odômetro</th><th>Km</th><th>Vol L</th><th>Consumo</th><th>Comb.</th><th>Preço/L</th><th>Total</th><th>Posto</th><th>Descrição</th><th></th></tr></thead><tbody id="tby"></tbody></table></div>
  <div id="sts-pills" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px"></div>`;
  renderTabela();
}
function toggleForm(){const f=document.getElementById('form-abast');f.style.display=f.style.display==='none'?'block':'none'}
function toggleOrdem(){
  fOrdem=fOrdem==='desc'?'asc':'desc';
  const btn=document.getElementById('btn-ordem');
  if(btn) btn.textContent=fOrdem==='desc'?'↓ Mais recente':'↑ Mais antigo';
  renderTabela();
}
function renderTabela(){
  let d=TODOS.filter(d=>d.vol>0);
  if(fCiclo!=='todos')d=d.filter(x=>x.ciclo===parseInt(fCiclo));
  if(fComb!=='todos')d=d.filter(x=>x.comb===fComb);
  if(fBusca)d=d.filter(x=>(x.posto+x.desc).toLowerCase().includes(fBusca.toLowerCase()));
  d=fOrdem==='desc'?[...d].reverse():d;
  document.getElementById('cnt-lbl').textContent=d.length+' registros';
  const s=calcS(d);
  document.getElementById('tby').innerHTML=d.map((x,i)=>{
    const cl=x.ciclo===1?'c1b':x.ciclo===2?'c2b':'c3b';
    const cv=x.cons>0?(x.cons>=s.consG?'g':'r'):'';
    return`<tr><td class="n" style="color:var(--muted)">${i+1}</td><td><span class="cbadge ${cl}">${x.ciclo}º</span></td><td><b>${x.data}</b></td><td class="n">${fmtKm(x.odo)}</td><td class="n">${x.km}</td><td class="n">${fmtN(x.vol)}</td><td class="${cv}">${x.cons>0?fmtN(x.cons)+' km/L':'—'}</td><td><span class="fb ${x.comb==='Gasolina'?'gas':'eth'}"><span class="dot"></span>${x.comb}</span></td><td class="n">${fmtN(x.pl)}</td><td class="n">${fmtR(x.total)}</td><td style="font-size:14px;color:var(--muted2)">${x.posto||'—'}</td><td style="font-size:14px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis">${x.desc||'—'}</td><td><button class="btn sm danger" onclick="del(${TODOS.indexOf(x)})">✕</button></td></tr>`;
  }).join('');
  const pill=v=>`<div style="font-size:14px;font-family:var(--mono);background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 11px;color:var(--muted)">${v}</div>`;
  document.getElementById('sts-pills').innerHTML=[
    pill(`Total: <span style="color:var(--text)">${fmtR(s.tGasto)}</span>`),
    pill(`Km: <span style="color:var(--text)">${fmtKm(s.tKm)}</span>`),
    pill(`Litros: <span style="color:var(--text)">${fmtN(s.tVol)}</span>`),
    pill(`Média: <span style="color:var(--accent)">${fmtN(s.consG)} km/L</span>`),
    pill(`Custo/km: <span style="color:var(--blue)">R$${fmtN(s.tGasto/Math.max(1,s.tKm))}</span>`),
    pill(`Gas: <span style="color:#e8f040">${s.gas.length} abast.</span>`),
    pill(`Eth: <span style="color:#40f0a8">${s.eth.length} abast.</span>`),
  ].join('');
}
function salvarAbast(){
  const dt=document.getElementById('f-dt').value.trim();
  const odo=parseFloat(document.getElementById('f-odo').value);
  const vol=parseFloat(document.getElementById('f-vol').value);
  const pl=parseFloat(document.getElementById('f-pl').value);
  if(!dt||isNaN(odo)||isNaN(vol)||isNaN(pl)){toast('⚠ Preencha data, odômetro, volume e preço/L');return}
  const prev=TODOS.filter(d=>d.odo<odo);
  const kmCalc=prev.length?odo-Math.max(...prev.map(d=>d.odo)):0;
  const cons=kmCalc>0?fR(kmCalc/vol):0;
  const combAbast=document.getElementById('f-comb').value;
  const combCons=document.getElementById('f-combc')?.value||combAbast;
  TODOS.push({data:dt,odo,km:Math.max(0,kmCalc),vol,cons,combC:combCons,comb:combAbast,total:fR(vol*pl),pl,posto:document.getElementById('f-posto').value.trim(),desc:document.getElementById('f-desc').value.trim(),ciclo:3});
  TODOS.sort((a,b)=>a.odo-b.odo);
  document.getElementById('fbk').style.display='inline';setTimeout(()=>document.getElementById('fbk').style.display='none',2000);
  ['f-dt','f-odo','f-vol','f-pl','f-posto','f-desc'].forEach(id=>document.getElementById(id).value='');
  renderTabela();toast('✓ Registrado!');
}
function del(i){if(!confirm('Excluir?'))return;TODOS.splice(i,1);renderTabela();toast('Removido')}

function saveTrajetos(){try{localStorage.setItem('tcross_trajetos',JSON.stringify(TRAJETOS))}catch(e){}}
function loadTrajetos(){try{const s=localStorage.getItem('tcross_trajetos');if(s)TRAJETOS=JSON.parse(s)}catch(e){}}
loadTrajetos();

function editTrajeto(i){
  const t=TRAJETOS[i];
  const nome=prompt('Nome do trajeto:',t.nome);if(nome===null)return;
  const dist=parseFloat(prompt('Distância ida/volta (km):',t.dist));if(isNaN(dist))return;
  const kmSem=parseFloat(prompt('km/semana neste trajeto (0 se eventual):',t.kmSem));if(isNaN(kmSem))return;
  const gasP=parseFloat(prompt('Preço gasolina (R$/L):',t.gasP));if(isNaN(gasP))return;
  const ethP=parseFloat(prompt('Preço etanol (R$/L):',t.ethP));if(isNaN(ethP))return;
  TRAJETOS[i]={...t,nome,dist,kmSem,gasP,ethP};
  saveTrajetos();
  toast('✓ Trajeto atualizado!');
  renderTrajetos();
}

function addTrajeto(){
  const nome=prompt('Nome do novo trajeto:');if(!nome)return;
  const dist=parseFloat(prompt('Distância ida/volta (km):'));if(isNaN(dist))return;
  const kmSem=parseFloat(prompt('km/semana (0 se eventual):'))||0;
  const gasP=parseFloat(prompt('Preço gasolina (R$/L):',TRAJETOS[0]?.gasP||7.12));if(isNaN(gasP))return;
  const ethP=parseFloat(prompt('Preço etanol (R$/L):',TRAJETOS[0]?.ethP||4.95));if(isNaN(ethP))return;
  TRAJETOS.push({nome,dist,kmSem,gasKmL:10.23,ethKmL:8.07,gasP,ethP});
  saveTrajetos();
  toast('✓ Trajeto adicionado!');
  renderTrajetos();
}

function delTrajeto(i){
  if(!confirm('Excluir trajeto "'+TRAJETOS[i].nome+'"?'))return;
  TRAJETOS.splice(i,1);
  saveTrajetos();
  renderTrajetos();
  toast('Trajeto removido');
}

async function syncTrajetos(){
  try{
    const token=await gsGetToken();
    await gsGarantirAba(token);
    const header=['Nome','Distância (km)','km/Semana','Preço Gas R$/L','Preço Eth R$/L','Gas km/L','Eth km/L'];
    const rows=TRAJETOS.map(t=>[t.nome,t.dist,t.kmSem,t.gasP,t.ethP,t.gasKmL,t.ethKmL]);
    const range=encodeURIComponent('App_Dados!M1:S'+(rows.length+1));
    await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+GS.SHEET_ID+'/values/'+range+'?valueInputOption=USER_ENTERED',{
      method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({values:[header,...rows]})
    });
    toast('✓ Trajetos salvos no Sheets!');
  }catch(e){toast('Salvo localmente. Sheets: '+e.message)}
}

function renderTrajetos(){
  const el=document.getElementById('sec-trajetos');
  // totais dinamicos
  const kmSemTotal=TRAJETOS.reduce((a,t)=>a+t.kmSem,0);
  const kmMesTotal=fR(kmSemTotal*4.33);
  const gasP0=TRAJETOS[0]?.gasP||7.12,ethP0=TRAJETOS[0]?.ethP||4.95;
  const me=mediasEfetivas();
  const mGas=me.mGas||10.23,mEth=me.mEth||8.07;
  const rMesGas=fR(kmMesTotal/mGas*gasP0),rMesEth=fR(kmMesTotal/mEth*ethP0);
  let html=`
  <div class="sh">
    <span class="sh-title">Trajetos e rotas</span>
    <div class="sh-actions">
      <button class="btn sm" onclick="addTrajeto()">+ Novo</button>
      <button class="btn sm" onclick="syncTrajetos()">↑ Sheets</button>
    </div>
  </div>
  <div class="cc" style="margin-bottom:18px">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;text-align:center">
      <div><div style="font-size:13px;font-family:var(--mono);color:var(--muted);margin-bottom:4px">KM/SEMANA</div><div style="font-size:25px;font-weight:800;color:var(--accent)">${fmtN(kmSemTotal,0)}</div></div>
      <div><div style="font-size:13px;font-family:var(--mono);color:var(--muted);margin-bottom:4px">KM/MÊS</div><div style="font-size:25px;font-weight:800;color:var(--blue)">${fmtN(kmMesTotal,0)}</div></div>
      <div><div style="font-size:13px;font-family:var(--mono);color:var(--muted);margin-bottom:4px">R$/MÊS GAS</div><div style="font-size:25px;font-weight:800;color:var(--accent)">${fmtN(rMesGas,0)}</div></div>
      <div><div style="font-size:13px;font-family:var(--mono);color:var(--muted);margin-bottom:4px">R$/MÊS ETH</div><div style="font-size:25px;font-weight:800;color:var(--green)">${fmtN(rMesEth,0)}</div></div>
    </div>
  </div>
  <div class="route-grid">`;
  TRAJETOS.forEach((t,i)=>{
    const gV=fR((t.dist/mGas)*t.gasP),eV=fR((t.dist/mEth)*t.ethP);
    const gM=t.kmSem>0?fR(gV*(t.kmSem/t.dist)*4.33):0,eM=t.kmSem>0?fR(eV*(t.kmSem/t.dist)*4.33):0;
    const w=eV<gV?'Etanol':'Gasolina';
    html+=`<div class="rc">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">
        <div class="rc-name">${t.nome}</div>
        <div style="display:flex;gap:4px">
          <button class="btn sm" onclick="editTrajeto(${i})" style="padding:2px 7px;font-size:13px">✏</button>
          <button class="btn sm danger" onclick="delTrajeto(${i})" style="padding:2px 7px;font-size:13px">✕</button>
        </div>
      </div>
      <div class="rc-dist">${t.dist} km ida/volta${t.kmSem>0?' · '+t.kmSem+' km/sem':' · eventual'}</div>
      <div class="rrow"><span style="color:var(--muted)">Custo/viagem Gas</span><span class="fb gas"><span class="dot"></span>${fmtR(gV)}</span></div>
      <div class="rrow"><span style="color:var(--muted)">Custo/viagem Eth</span><span class="fb eth"><span class="dot"></span>${fmtR(eV)}</span></div>
      ${t.kmSem>0?'<div class="rrow"><span style="color:var(--muted)">Custo mensal Gas</span><span style="font-family:var(--mono);font-size:14px">'+fmtR(gM)+'</span></div><div class="rrow"><span style="color:var(--muted)">Custo mensal Eth</span><span style="font-family:var(--mono);font-size:14px">'+fmtR(eM)+'</span></div>':''}
      <div class="rrow"><span style="color:var(--muted)">Volume/viagem Gas</span><span style="font-family:var(--mono);font-size:14px">${fmtN(t.dist/mGas)} L</span></div>
      <div class="rrow"><span style="color:var(--muted)">Volume/viagem Eth</span><span style="font-family:var(--mono);font-size:14px">${fmtN(t.dist/mEth)} L</span></div>
      <div><span class="rwin">✓ ${w} mais econômico</span></div>
    </div>`;
  });
  html+=`</div>
  <div class="sh"><span class="sh-title">Custo por viagem — comparativo</span></div>
  <div class="cc"><div class="cw" style="height:260px"><canvas id="ch-traj"></canvas></div></div>`;
  el.innerHTML=html;
  dc('ch-traj');
  charts['ch-traj']=new Chart(document.getElementById('ch-traj'),{type:'bar',data:{labels:TRAJETOS.map(t=>t.nome.split(' ').slice(0,2).join(' ')),datasets:[{label:'Gasolina',data:TRAJETOS.map(t=>fR((t.dist/mGas)*t.gasP)),backgroundColor:'rgba(232,240,64,0.8)',borderRadius:4},{label:'Etanol',data:TRAJETOS.map(t=>fR((t.dist/mEth)*t.ethP)),backgroundColor:'rgba(64,240,168,0.8)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#f0f2f8',font:{size:12}}}},scales:{x:{ticks:{color:'#6a7090',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#6a7090',callback:v=>'R$'+v},grid:{color:'rgba(255,255,255,0.04)'}}}}});
}

function calcCorte(){
  const gas=parseFloat(document.getElementById('c-gas').value)||0,eth=parseFloat(document.getElementById('c-eth').value)||0;

  // Usa medias reais do carro, nao o valor fixo do INMETRO
  const s=calcS(TODOS);
  const mGas=s.mGas||11.8,mEth=s.mEth||10.1;
  const corteReal=mEth/mGas; // ponto de corte baseado nas medias reais
  const rel=(eth/gas)*100;
  const limiar=corteReal*100;
  const w=rel<limiar;
  const cortePreco=gas*corteReal;
  const eco=Math.abs((gas/mGas-eth/mEth)*1350);
  document.getElementById('cr-rel').textContent=fmtN(rel,1)+'%';
  document.getElementById('cr-rel').style.color=w?'var(--green)':'var(--orange)';
  document.getElementById('cr-corte').textContent='R$ '+fmtN(cortePreco);
  document.getElementById('cr-limiar').textContent=fmtN(limiar,1)+'%';
  document.getElementById('cr-win').textContent=(w?'Etanol':'Gasolina')+' ✓';
  document.getElementById('cr-win').style.color=w?'var(--green)':'var(--accent)';
  document.getElementById('cr-eco').textContent='Economia: R$ '+fmtN(eco,0)+'/mês';
}

function handleDrop(e){e.preventDefault();document.getElementById('dz').classList.remove('drag');if(e.dataTransfer.files[0])processCSV(e.dataTransfer.files[0])}
function handleFile(e){if(e.target.files[0])processCSV(e.target.files[0])}
function parseCSVLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){if(l[i]==='"')q=!q;else if(l[i]===','&&!q){r.push(c);c=''}else c+=l[i]}r.push(c);return r}
function processCSV(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
    let ciclo=3;
    if(file.name.includes('1º')||file.name.includes('1o'))ciclo=1;
    else if(file.name.includes('2º')||file.name.includes('2o'))ciclo=2;
    const novos=[];
    for(let i=1;i<lines.length;i++){
      const v=parseCSVLine(lines[i]);
      if(!v[0]||['TOTAL','Estatísticas','DASHBOARD'].some(x=>v[0].includes(x)))continue;
      const km=parseFloat((v[2]||'').replace(',','.'));
      const vol=parseFloat((v[3]||'').replace(',','.'));
      if(!v[0].trim()||isNaN(vol)||vol<=0)continue;
      novos.push({data:v[0].trim(),odo:parseInt(v[1])||0,km:isNaN(km)?0:km,vol,cons:parseFloat((v[4]||'0').replace(',','.'))||0,combC:(v[6]||'').trim()||undefined,comb:(v[7]||v[6]||'Gasolina').trim(),total:parseFloat((v[8]||'0').replace(',','.'))||0,pl:parseFloat((v[2]||'0').replace(',','.'))||0,posto:(v[9]||'').trim(),desc:(v[10]||'').trim(),ciclo});
    }
    if(novos.length){
      TODOS=[...TODOS,...novos];TODOS.sort((a,b)=>a.odo-b.odo);
      const seen=new Set();TODOS=TODOS.filter(d=>{const k=`${d.odo}-${d.vol}`;if(seen.has(k))return false;seen.add(k);return true});
      document.getElementById('imp-msg').innerHTML=`<div style="background:rgba(64,240,168,.08);border:1px solid rgba(64,240,168,.2);border-radius:10px;padding:12px 16px;font-size:12px;font-family:var(--mono);color:var(--green)">✓ ${novos.length} registros importados de "${file.name}"</div>`;
      toast(`✓ ${novos.length} registros importados!`);
    }else{
      document.getElementById('imp-msg').innerHTML=`<div style="background:rgba(240,64,64,.08);border:1px solid rgba(240,64,64,.2);border-radius:10px;padding:12px 16px;font-size:12px;font-family:var(--mono);color:var(--red)">⚠ Nenhum dado válido. Verifique o formato do arquivo.</div>`;
    }
  };
  reader.readAsText(file,'UTF-8');
}
function exportCSV(){
  const rows=[['Data','Odômetro','Km Percorridos','Volume (L)','Consumo (km/L)','Combustível abastecido','Preço Total (R$)','Preço/L (R$)','Posto','Descrição da Viagem','Ciclo']];
  TODOS.filter(d=>d.vol>0).forEach(d=>{rows.push([d.data,d.odo,d.km,d.vol.toFixed(2).replace('.',','),d.cons.toFixed(1).replace('.',','),d.comb,d.total.toFixed(2).replace('.',','),d.pl.toFixed(2).replace('.',','),d.posto,d.desc,d.ciclo+'º Ciclo'])});
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download='Consumo_T-CROSS_Todos_Ciclos.csv';a.click();
  toast('✓ CSV baixado!');
}
function exportGSheets(){exportCSV();setTimeout(()=>{window.open('https://docs.google.com/spreadsheets/create','_blank');toast('Sheets aberto! Use Arquivo → Importar para carregar o CSV.')},600)}

          if(resp.error){rej(resp.error);return}
          GS.token = resp.access_token;
          GS.tokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
          res(resp.access_token);
        }
      });
      client.requestAccessToken();
    });
  });
}

async function gsGetToken(){
  if(GS.token && Date.now() < GS.tokenExpiry) return GS.token;
  return await gsAuth();
}

// Lê a aba de abastecimentos da planilha
async function gsLerAbastecimentos(){
  const token = await gsGetToken();
  const range = encodeURIComponent(`${GS.SHEET_NAME}!A2:K200`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${GS.SHEET_ID}/values/${range}`;
  const resp = await fetch(url, {headers:{Authorization:`Bearer ${token}`}});
  if(!resp.ok) throw new Error('Erro ao ler planilha: '+resp.status);
  const data = await resp.json();
  return data.values || [];
}

// Escreve uma nova linha no final da aba
async function gsEscreverLinha(linha){
  const token = await gsGetToken();
  const range = encodeURIComponent(`${GS.SHEET_NAME}!A:K`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${GS.SHEET_ID}/values/${range}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  const resp = await fetch(url,{
    method:'POST',
    headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
    body: JSON.stringify({values:[linha]})
  });
  if(!resp.ok) throw new Error('Erro ao salvar: '+resp.status);
  return await resp.json();
}

// Sincroniza todos os dados locais de volta para a planilha
async function gsGarantirAba(token){
  const resp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${GS.SHEET_ID}?fields=sheets.properties`,{headers:{Authorization:`Bearer ${token}`}});
  const data=await resp.json();
  const existe=(data.sheets||[]).some(s=>s.properties.title==='App_Dados');
  if(!existe){
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${GS.SHEET_ID}:batchUpdate`,{
      method:'POST',
      headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({requests:[{addSheet:{properties:{title:'App_Dados'}}}]})
    });
    if(!r.ok) throw new Error('Erro ao criar aba: '+r.status);
  }
}

async function gsSyncTodos(){
  const token = await gsGetToken();
  await gsGarantirAba(token);
  const header=['Data','Odômetro','Km Percorridos','Volume (L)','Consumo (km/L)','Combustível','Preço Total (R$)','Preço/L (R$)','Posto','Descrição','Ciclo'];
  const rows = TODOS.filter(d=>d.vol>0).map(d=>[
    d.data, d.odo, d.km,
    d.vol.toFixed(2).replace('.',','),
    d.cons.toFixed(1).replace('.',','),
    d.comb,
    d.total.toFixed(2).replace('.',','),
    d.pl.toFixed(2).replace('.',','),
    d.posto, d.desc, d.ciclo+'º Ciclo'
  ]);
  const range=encodeURIComponent(`App_Dados!A1:K${rows.length+1}`);
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${GS.SHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`;
  const resp=await fetch(url,{
    method:'PUT',
    headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify({values:[header,...rows]})
  });
  if(!resp.ok) throw new Error('Erro ao sincronizar: '+resp.status);
  return await resp.json();
}

// Converte linha do Sheets para objeto
function gsLinhaParaObj(v, ciclo){
  const km = parseFloat((v[2]||'0').replace(',','.'));
  const vol = parseFloat((v[3]||'0').replace(',','.'));
  if(!v[0]||isNaN(vol)||vol<=0) return null;
  return {
    data:(v[0]||'').trim(), odo:parseInt(v[1])||0,
    km:isNaN(km)?0:km, vol,
    cons:parseFloat((v[4]||'0').replace(',','.'))||0,
    comb:(v[6]||v[5]||'Gasolina').trim(),
    total:parseFloat((v[7]||'0').replace(',','.'))||0,
    pl:parseFloat((v[8]||'0').replace(',','.'))||0,
    posto:(v[9]||'').trim(), desc:(v[10]||'').trim(),
    ciclo: ciclo||3
  };
}

// ── UI de sincronização ──
function gsStatusEl(id){return document.getElementById(id)}

async function gsImportar(){
  const btn=document.getElementById('btn-gs-import');
  const msg=document.getElementById('gs-msg');
  btn.textContent='⏳ Conectando…';btn.disabled=true;
  msg.innerHTML='';
  try{
    const rows = await gsLerAbastecimentos();
    const novos=[];
    rows.forEach(v=>{
      if(!v[0]||['TOTAL','Estatísticas','Data'].includes(v[0].trim()))return;
      const obj=gsLinhaParaObj(v,3);
      if(obj) novos.push(obj);
    });
    if(novos.length){
      TODOS=[...TODOS,...novos];
      TODOS.sort((a,b)=>a.odo-b.odo);
      const seen=new Set();
      TODOS=TODOS.filter(d=>{const k=`${d.odo}-${d.vol}`;if(seen.has(k))return false;seen.add(k);return true});
      msg.innerHTML=`<div class="gs-ok">✓ ${novos.length} registros importados do Google Sheets!</div>`;
      toast(`✓ ${novos.length} registros importados!`);
    } else {
      msg.innerHTML=`<div class="gs-warn">⚠ Nenhum dado novo encontrado na aba "${GS.SHEET_NAME}".</div>`;
    }
    btn.textContent='↓ Importar do Sheets';btn.disabled=false;
  }catch(e){
    msg.innerHTML=`<div class="gs-err">✕ Erro: ${e.message}</div>`;
    btn.textContent='↓ Importar do Sheets';btn.disabled=false;
    toast('Erro ao importar: '+e.message);
  }
}

async function gsExportar(){
  const btn=document.getElementById('btn-gs-export');
  const msg=document.getElementById('gs-msg');
  btn.textContent='⏳ Salvando…';btn.disabled=true;
  msg.innerHTML='';
  try{
    await gsSyncTodos();
    const total=TODOS.filter(d=>d.vol>0).length;
    msg.innerHTML=`<div class="gs-ok">✓ ${total} registros salvos na planilha Google Sheets!</div>`;
    toast('✓ Dados salvos no Google Sheets!');
    btn.textContent='↑ Exportar para Sheets';btn.disabled=false;
  }catch(e){
    msg.innerHTML=`<div class="gs-err">✕ Erro: ${e.message}</div>`;
    btn.textContent='↑ Exportar para Sheets';btn.disabled=false;
    toast('Erro ao exportar: '+e.message);
  }
}

async function gsSalvarUm(d){
  try{
    const linha=[d.data,d.odo,d.km,
      d.vol.toFixed(2).replace('.',','),
      d.cons.toFixed(1).replace('.',','),
      d.comb,d.comb,
      d.total.toFixed(2).replace('.',','),
      d.pl.toFixed(2).replace('.',','),
      d.posto,d.desc];
    await gsEscreverLinha(linha);
    toast('✓ Salvo no Google Sheets!');
  }catch(e){
    toast('⚠ Salvo localmente. Sheets: '+e.message);
  }
}

// Sobrescreve salvarAbast para também salvar no Sheets se autenticado
const _salvarOrig = salvarAbast;
salvarAbast = async function(){

  if(GS.token && Date.now() < GS.tokenExpiry){
    const ultimo = TODOS[TODOS.length-1];
    if(ultimo) await gsSalvarUm(ultimo);
  }
};
